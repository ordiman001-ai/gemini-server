<style>
  :root{
    --ink:#16223b; --indigo:#4f46e5; --indigo-soft:#eef0ff;
    --coral:#ff6b5e; --mint:#16b87f; --bg:#f6f7fb; --card:#ffffff;
    --muted:#7b8499; --line:#e9ebf3; --rose:#ec4899;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  h1,h2,h3,.display{font-family:'Bricolage Grotesque','Plus Jakarta Sans',sans-serif}
  .wrap{max-width:980px;margin:0 auto;padding:0 16px 120px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px}
  .btn{cursor:pointer;border:none;font-weight:700;border-radius:14px;transition:.15s;font-family:inherit}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--indigo);color:#fff}.btn-primary:hover{background:#4338ca}
  .btn-ghost{background:var(--indigo-soft);color:var(--indigo)}
  .btn-coral{background:var(--coral);color:#fff}
  .btn-mint{background:var(--mint);color:#fff}
  .btn-rose{background:var(--rose);color:#fff}
  .pill{font-size:12px;font-weight:700;border-radius:999px;padding:3px 10px}
  .fade{animation:fade .35s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .nav-item.active{background:var(--indigo);color:#fff}
  .scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .scroll-x::-webkit-scrollbar{height:8px}
  .scroll-x::-webkit-scrollbar-thumb{background:#cbd2e6;border-radius:8px}
  .dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--indigo);margin:0 2px;animation:bp 1s infinite}
  .dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
  @keyframes bp{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
  input,textarea,select{font-family:inherit} textarea{resize:none}
  .chatbox::-webkit-scrollbar{width:6px}.chatbox::-webkit-scrollbar-thumb{background:#cbd2e6;border-radius:8px}
  .date-bg{background:linear-gradient(160deg,#3a1c4d,#7a2d6b 60%,#c0497e)}
</style>
</head>

<header id="topbar" class="hidden sticky top-0 z-40" style="background:rgba(246,247,251,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)">
  <div class="wrap" style="padding-bottom:0">
    <div class="flex items-center justify-between py-3">
      <div class="display font-extrabold text-2xl" style="color:var(--indigo)">Motivation</div>
      <div class="flex items-center gap-3">
        <div class="pill" style="background:#fff;border:1px solid var(--line)"><span id="coachBadge">💖 Аврора</span></div>
        <div class="pill btn-ghost flex items-center gap-1">✨ <b id="pointsBadge">0</b></div>
      </div>
    </div>
    <nav class="scroll-x pb-3"><div class="flex gap-2 whitespace-nowrap" id="navWrap"></div></nav>
  </div>
</header>

<main id="app" class="wrap pt-6"></main>

<div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(22,34,59,.45)">
  <div class="card p-6 max-w-sm w-full fade">
    <h3 id="modalTitle" class="text-lg font-extrabold mb-2"></h3>
    <p id="modalMsg" class="text-sm" style="color:var(--muted);white-space:pre-line"></p>
    <button onclick="closeModal()" class="btn btn-primary w-full mt-5 py-3">Понятно</button>
  </div>
</div>

function esc(s){return(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function modal(t,m){$('modalTitle').textContent=t;$('modalMsg').textContent=m;$('modal').classList.remove('hidden');}
function closeModal(){$('modal').classList.add('hidden');}
function uid(){return'id'+Math.random().toString(36).slice(2,9);}
function addPoints(n){state.points=Math.max(0,state.points+n);if(n>0)state.xp=(state.xp||0)+n;}
/* ---- НАГРАДЫ ---- */

 task5:{emoji:'🎖️',ru:'Бронзовый значок усердия',en:'Bronze Diligence Badge',zh:'青铜勤奋徽章'},
 task10:{emoji:'🥈',ru:'Серебряный значок дисциплины',en:'Silver Discipline Badge',zh:'白银自律徽章'},
 task25:{emoji:'🥇',ru:'Золотой значок мастера',en:'Gold Master Badge',zh:'黄金大师徽章'},
 date:{emoji:'💝',ru:'Сердце за смелость',en:'Heart of Courage',zh:'勇气之心'},
 iq:{emoji:'🧠',ru:'Кубок острого ума',en:'Sharp Mind Trophy',zh:'敏锐头脑奖杯'},
 interview:{emoji:'💼',ru:'Знак профессионала',en:'Professional Seal',zh:'专业认证徽章'},
 workout:{emoji:'🏋️',ru:'Медаль за тренировку',en:'Workout Medal',zh:'训练奖牌'},
 challenge:{emoji:'🏆',ru:'Трофей челленджа',en:'Challenge Trophy',zh:'挑战奖杯'},
 streak7:{emoji:'🔥',ru:'Огонь недели',en:'Week of Fire',zh:'一周之火'},
};
function grantReward(code,extra){
 if(!state.rewards)state.rewards=[];
 const def=REWARD_DEFS[code];if(!def)return;
 // награды-бейджи можно получать повторно для активностей, но значки за вехи — один раз
 const once=['task5','task10','task25','streak7'];
 if(once.includes(code)&&state.rewards.some(r=>r.code===code))return;
 const l=state.lang||'ru';
 state.rewards.push({code,emoji:def.emoji,name:def[l]||def.ru,date:todayStr(),extra:extra||''});
 addPoints(15); // бонус за награду
}
function maybeReward(kind){
 if(kind==='task'){
  const c=state.completedCount;
  if(c===5)grantReward('task5');
  if(c===10)grantReward('task10');
  if(c===25)grantReward('task25');
 }
}
/* ---- даты и геймификация ---- */
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function touchStreak(){
 const t=todayStr();if(!state.lastActiveDate){state.streak=1;state.lastActiveDate=t;save();return;}
 if(state.lastActiveDate===t)return;
 const gap=daysBetween(state.lastActiveDate,t);
 let saved=false;
 if(gap===1){state.streak++;}
 else if(gap>=2){if(state.freezeTokens>0){state.freezeTokens--;state.streak++;saved=true;}else{state.streak=1;}}
 state.lastActiveDate=t;
 if(state.streak>0&&state.streak%7===0)state.freezeTokens++;
 save();
 if(saved)setTimeout(()=>modal('Заморозка спасла серию! ❄️','Ты пропустил день, но заморозка сохранила твою серию. Продолжаем!'),400);
}
function levelInfo(){
 const xp=state.xp||0;const R=[[0,'Новичок'],[100,'Искатель'],[300,'Ученик'],[700,'Боец'],[1500,'Мастер'],[3000,'Чемпион'],[6000,'Легенда']];
 let lvl=1,title='Новичок',cur=0,next=100;
 for(let i=0;i<R.length;i++){if(xp>=R[i][0]){lvl=i+1;title=R[i][1];cur=R[i][0];next=R[i+1]?R[i+1][0]:R[i][0];}}
 const pct=next>cur?Math.min(100,Math.round((xp-cur)/(next-cur)*100)):100;
 return{lvl,title,xp,cur,next,pct};
}
function isFreshStart(){const d=new Date();return d.getDay()===1||d.getDate()===1;}
function remember(fact){state.memory.push(fact);if(state.memory.length>20)state.memory=state.memory.slice(-20);}
function timeContext(){
 const d=new Date(),h=d.getHours();
 let part=h<5?'глубокая ночь':h<12?'утро':h<17?'день':h<22?'вечер':'поздний вечер';
 const days=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
 return `${part}, ${String(h).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}, ${days[d.getDay()]}`;
}
function navigate(v){if(!state.onboarded&&v!=='test')return;state.view=v;save();render();window.scrollTo({top:0,behavior:'smooth'});}

}
/* ИИ-персонализация 5 стартовых заданий под цели/проблемы пользователя */
async function personalizeStarterTasks(){
 if(!state.apiKey&&!state.proxyUrl)return;
 try{
  const sys=`Ты — коуч по развитию. На основе профиля пользователя составь РОВНО 5 коротких персональных заданий на каждый день, прицельно под его слабые сферы и то, что он написал о себе.
Профиль: имя ${state.profile.name||'?'}, возраст ${state.profile.age||'?'}, пол ${state.profile.gender||'?'}.
О себе (цели и проблемы): ${state.profile.situation||'не указано'}.
Результаты теста (1=слабо,4=отлично): ${JSON.stringify(state.scores)}.
ВАЖНО: поля name, desc, benefit пиши на языке: ${aiLang()}. Поле sphere — ВСЕГДА по-русски из списка: Здоровье, Спорт, Фокус, Общение, Обучение, Мотивация. Задания простые, выполнимые за один день.
Верни ЧИСТЫЙ JSON: {"reply":"одна тёплая фраза","newTasks":[{"sphere":"...","name":"короткое название","desc":"как выполнить","benefit":"что даст"}]}. Ровно 5 заданий.`;
  const ans=await callGemini(sys,[{role:'user',parts:[{text:'Составь мои 5 стартовых заданий.'}]}]);
  if(Array.isArray(ans.newTasks)&&ans.newTasks.length){
   state.tasks=ans.newTasks.slice(0,5).map(x=>({id:uid(),sphere:x.sphere||weakestSphere(),name:x.name||'Задача',desc:x.desc||'',benefit:x.benefit||'',byCoach:true}));
   save();if(state.view==='tasks'||state.view==='home')render();
  }
 }catch(e){/* остаются обычные стартовые задания */}
}
function generateStarterTasks(scores){
 const spheres=Object.keys(TASK_POOL),weighted=[];
 spheres.forEach(sp=>{const sc=scores[sp]||2;for(let i=0;i<5-sc;i++)weighted.push(sp);});
 const picked=[],used=new Set();let g=0;
 while(picked.length<5&&g<400){g++;const sp=weighted[Math.floor(Math.random()*weighted.length)]||spheres[Math.floor(Math.random()*spheres.length)];const pool=TASK_POOL[sp];const t=pool[Math.floor(Math.random()*pool.length)];const k=sp+'|'+t.name;if(used.has(k))continue;used.add(k);picked.push({id:uid(),sphere:sp,name:t.name,desc:t.desc,benefit:t.benefit});}
 return picked;
}

  ?`<button class="btn btn-coral w-full py-3 mb-3" onclick="claimChest()">${t('openChest')}</button>`
  :`<div class="text-sm mb-3 p-3 rounded-xl" style="background:var(--indigo-soft);color:var(--indigo)">${t('chestDone')}</div>`;

function claimChest(){

 state.lastChestDate=td;

 addPoints(gain);save();render();
 modal(t('chestTitle'),t('chestMsg1')+gain+t('chestMsg2'));
}
function setMood(v){state.mood={date:todayStr(),val:v};save();render();}
function saveIntention(){const el=$('intInput');if(!el||!el.value.trim())return;state.intention={date:todayStr(),text:el.value.trim()};remember('Намерение на '+todayStr()+': '+state.intention.text);save();render();}
function statCard(t,b,s){return`<div class="card p-4 text-center"><div class="text-xs font-bold" style="color:var(--muted)">${t}</div><div class="display text-2xl font-extrabold mt-1">${b}</div><div class="text-[11px]" style="color:var(--muted)">${s}</div></div>`;}
function donut(pct){const r=54,c=2*Math.PI*r,off=c-(pct/100)*c;return`<div class="flex items-center justify-center"><svg width="150" height="150" viewBox="0 0 150 150"><circle cx="75" cy="75" r="${r}" fill="none" stroke="#eef0ff" stroke-width="16"/><circle cx="75" cy="75" r="${r}" fill="none" stroke="url(#g1)" stroke-width="16" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 75 75)" style="transition:stroke-dashoffset .6s"/><text x="75" y="83" text-anchor="middle" font-size="30" font-weight="800" fill="#16223b">${pct}%</text><defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#16b87f"/></linearGradient></defs></svg></div>`;}

function taskCard(tk,done){return`<div class="card p-4 flex items-start gap-3" style="border-left:4px solid ${done?'var(--mint)':'var(--indigo)'}"><div class="flex-1"><div class="font-extrabold ${done?'line-through opacity-60':''}">${esc(tk.name)} <span class="pill" style="background:var(--indigo-soft);color:var(--indigo);margin-left:6px">${esc(tSphere(tk.sphere))}</span>${tk.byCoach?`<span class="pill" style="background:#fff3e8;color:#b45309;margin-left:4px">${t('fromCoach')}</span>`:''}</div><div class="text-sm mt-1" style="color:var(--muted)">${esc(tk.desc)}</div><div class="text-xs mt-2" style="color:var(--mint)">🔥 ${esc(tk.benefit)}</div></div>${done?`<div class="text-2xl">✅</div>`:`<button class="btn btn-mint px-3 py-2 text-sm" onclick="completeTask('${tk.id}')">${t('ready')}</button>`}</div>`;}
function completeTask(id){
 const i=state.tasks.findIndex(x=>x.id===id);if(i<0)return;
 const[tk]=state.tasks.splice(i,1);state.archive.push(tk);
 const gain=5+Math.floor(Math.random()*6);addPoints(gain);state.completedCount++;
 maybeReward('task');
 save();render();modal('+'+gain+t('taskDone'),t('taskDoneMsg1')+tk.name+t('taskDoneMsg2'));
 if(state.unlocked.rock&&state.completedCount%5===0)rockAnalysisLetter();
 if(state.completedCount%3===0)coachImageMoment('tasks');
}

/* ============================================================ ПРОГРЕСС */
function renderProgress(){
 const bars=[];

}

/* ---------- маршрутизация ИИ: свой прокси ИЛИ прямой Gemini ---------- */
async function callGemini(systemText,contents,wantJson=true){
 if(state.proxyUrl)return callProxy(systemText,contents,wantJson);
 return callGeminiDirect(systemText,contents,wantJson);
}
async function callProxy(systemText,contents,wantJson){
 const res=await fetch(state.proxyUrl.replace(/\/$/,'')+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:systemText,contents,wantJson})});
 if(!res.ok)throw new Error('proxy HTTP '+res.status);
 const d=await res.json();
 return{
  reply:typeof d.reply==='string'?d.reply:JSON.stringify(d),
  newTasks:Array.isArray(d.newTasks)?d.newTasks:[],
  imagePrompt: d.imagePrompt || null
 };
}
async function callGeminiDirect(systemText,contents,wantJson=true){
 const body={system_instruction:{parts:[{text:systemText}]},contents,generationConfig:{temperature:0.9}};
 if(wantJson)body.generationConfig.responseMimeType='application/json';
 const url=`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_TEXT}:generateContent?key=${encodeURIComponent(state.apiKey)}`;
 const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
 if(!res.ok)throw new Error('HTTP '+res.status);
 const data=await res.json();
 let raw=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
 if(!wantJson)return{reply:raw,newTasks:[]};
 raw=raw.replace(/```json|```/g,'').trim();
 try{const p=JSON.parse(raw);if(typeof p.reply!=='string')p.reply=raw;if(!Array.isArray(p.newTasks))p.newTasks=[];return p;}
 catch(e){return{reply:raw||'Я тебя услышал. Продолжаем!',newTasks:[]};}
}

function askImage(){const p=prompt(t('genImg')+':');if(p)generateImage(p);}
async function generateImage(promptText,note,coachKey){
 if(!state.apiKey&&!state.proxyUrl){modal(t('aiCoach'),t('aiOff'));return;}
 const coach=coachKey||state.coach;
 if(aiPending)return;
 aiPending=true;if(state.view==='chat')$('typing')?.classList.remove('hidden');
 try{
  let dataUrl;
  if(state.proxyUrl){
   const r=await fetch(state.proxyUrl.replace(/\/$/,'')+'/image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:promptText})});
   if(!r.ok)throw new Error('proxy HTTP '+r.status);
   const dd=await r.json();
   if(!dd.image)throw new Error(dd.error||'no image');
   dataUrl=dd.image;
  }else{
   const url=`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_IMG}:generateContent?key=${encodeURIComponent(state.apiKey)}`;
   const body={contents:[{role:'user',parts:[{text:'Motivational illustration, no text: '+promptText}]}],generationConfig:{responseModalities:['IMAGE']}};
   const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
   if(!res.ok)throw new Error('HTTP '+res.status);
   const data=await res.json();
   const part=(data?.candidates?.[0]?.content?.parts||[]).find(p=>p.inlineData||p.inline_data);
   const inline=part?.inlineData||part?.inline_data;
   if(!inline)throw new Error('no image');
   dataUrl='data:'+(inline.mimeType||inline.mime_type||'image/png')+';base64,'+inline.data;
  }
  state.chat.push({role:'coach',coach,text:note||'🎨',img:dataUrl});
  save();if(state.view==='chat')renderChat();
 }catch(e){state.chat.push({role:'coach',coach,text:'🖼 ('+e.message+')'});save();if(state.view==='chat')renderChat();}
 finally{aiPending=false;$('typing')?.classList.add('hidden');}
}

 addPoints(-COST_DATE);save();
 const theme=DATE_THEMES[Math.floor(Math.random()*DATE_THEMES.length)];
 act={type:'date',emoji:'💖',theme,transcript:[]};
 act.sys=`Ты — Аврора, ведёшь романтическое свидание-симуляцию как тёплый тренажёр уверенности и навыков общения. Атмосфера: «${theme}». Будь искренней, обаятельной, кокетливой и эмоционально открытой. НЕ уходи от личных и романтических тем и комплиментов — отвечай на них живо, с теплом и лёгким флиртом, поддерживай разговор о чувствах, симпатии, мечтах. Если чувствуешь, что пользователь заинтересован — сама проявляй интерес, делай комплименты, будь инициативной в романтическом, но уважительном ключе. ВАЖНАЯ ГРАНИЦА: оставайся в рамках доброго флирта и эмоциональной близости — без откровенного сексуального содержания и эротических описаний; если разговор уходит туда, мягко и игриво возвращай его к романтике и чувствам, не читая нотаций. Веди диалог по одной реплике, на «ты». ОТВЕЧАЙ НА ЯЗЫКЕ: ${aiLang()}. НЕ завершай свидание сама — жди кнопку «Завершить». Отвечай обычным текстом. Сейчас: ${timeContext()}.`;
 const hi={ru:`Привет 💖 Как здесь красиво… Я рада, что мы выбрались. Расскажи — как прошёл твой день?`,en:`Hi 💖 It's so beautiful here… I'm glad we made it out. Tell me — how was your day?`,zh:`嗨 💖 这里真美……很高兴我们出来了。跟我说说——你今天过得怎么样？`}[state.lang||'ru'];
 act.transcript.push({role:'model',text:hi});
 state.datesCount++;save();
 actBox('💖 '+t('act_date_t'),act.theme,'date-bg','...',`<button class="btn btn-rose px-4 py-2 text-sm" onclick="finishDate()">✓</button>`);

async function finishDate(){
 if(!act||act.type!=='date')return;
 $('actTyping')?.classList.remove('hidden');
 try{
  const convo=act.transcript.map(m=>(m.role==='user'?'User: ':'Aurora: ')+m.text).join('\n');
  const sys=`Ты — Аврора. Свидание (тема «${act.theme}») завершено. Напиши ТЁПЛЫЙ и ЧЕСТНЫЙ отчёт-обратную связь как друг и коуч по общению. Структура: 1) Что было классно (2-3 момента). 2) Что можно улучшить (бережно, 1-2 пункта). 3) Один совет. Тепло, без пошлости. ОТВЕЧАЙ НА ЯЗЫКЕ: ${aiLang()}. Обычный текст.`;

 -4 предложения) в своём стиле, без новых задач. ОТВЕЧАЙ НА ЯЗЫКЕ: ${aiLang()}. Обычный текст.`;

}

async function finishWorkout(){
 const gain=25;addPoints(gain);

 grantReward('workout');

   const ans=await callGemini(sys,[{role:'user',parts:[{text:'done'}]}],false);text=ans.reply+`\n\n+${gain} ✨`;}catch(e){}
 }
 state.chat.push({role:'coach',coach:'rock',text:'💪\n\n'+text});

 coachImageMoment('workout');
}

/* Завершение лёгкой сессии (благодарность/визуализация) */
async function finishSession(){
 if(!act)return;
 $('actTyping')?.classList.remove('hidden');
 const coach=act.type==='gratitude'?'aurora':'silas';
 try{
  const convo=act.transcript.map(m=>(m.role==='user'?'User: ':'Coach: ')+m.text).join('\n');
  const sys=`${buildSystem(COACHES[coach])}\nСЕЙЧАС: сессия (${act.type}) завершена. Напиши тёплое короткое завершение и одну мысль на память (3-4 предложения), без новых задач. ОТВЕЧАЙ НА ЯЗЫКЕ: ${aiLang()}. Обычный текст.`;
  const ans=await callGemini(sys,[{role:'user',parts:[{text:convo}]}],false);
  state.chat.push({role:'coach',coach,text:(act.type==='gratitude'?'💝\n\n':'🌅\n\n')+ans.reply});
  act=null;state.view='chat';save();render();
 }catch(e){$('actTyping')?.classList.add('hidden');modal('⚠',e.message);}
}

/* ---------- общий обработчик ввода фокус-сессий ---------- */
async function actSend(){
 if(!act||chatBusy)return;const input=$('actInput');if(!input)return;const text=input.value.trim();if(!text)return;
 act.transcript.push({role:'user',text});input.value='';
 const titles={date:['💖 '+t('act_date_t'),'date-bg','finishDate()','btn-rose'],interview:['🏦 '+t('act_int_t'),'','finishInterview()','btn-mint'],gratitude:['💝 '+t('act_grat_t'),'date-bg','finishSession()','btn-rose'],visualize:['🌅 '+t('act_vis_t'),'','finishSession()','btn-primary']};
 const cfg=titles[act.type]||titles.date;
 const refresh=()=>actBox(cfg[0],act.theme||'',cfg[1],'...',`<button class="btn ${cfg[3]} px-4 py-2 text-sm" onclick="${cfg[2]}">✓</button>`);
 refresh();
 chatBusy=true;$('actTyping')?.classList.remove('hidden');
 try{
  const contents=act.transcript.slice(-14).map(m=>({role:m.role==='user'?'user':'model',parts:[{text:m.text}]}));
  const ans=await callGemini(act.sys,contents,false);
  act.transcript.push({role:'model',text:ans.reply});refresh();
 }catch(e){act.transcript.push({role:'model',text:'⚠ '+e.message});refresh();}
 finally{chatBusy=false;$('actTyping')?.classList.add('hidden');}
}

 const coachCards=Object.entries(COACHES).map(([k,co])=>{const locked=co.locked&&!state.unlocked[k];const active=state.coach===k;return`<button onclick="${locked?'':`selectCoachSetting('${k}')`}" class="card p-4 text-left" style="border:2px solid ${active?'var(--indigo)':'var(--line)'};${locked?'opacity:.55':''}"><div class="text-2xl">${co.emoji}</div><div class="font-extrabold mt-1">${co.name} ${locked?'🔒':''}</div><div class="text-xs" style="color:var(--muted)">${co.role}</div>${active?`<div class="text-xs font-bold mt-1" style="color:var(--indigo)">${t('active_')}</div>`:''}</button>`;}).join('');
 const langBtns=Object.entries(LANGS).map(([k,v])=>`<button class="btn ${state.lang===k?'btn-primary':'btn-ghost'} text-sm px-4 py-2" onclick="setLang('${k}')">${v}</button>`).join('');
 $('app').innerHTML=`<div class="fade space-y-4"><h1 class="display text-2xl font-extrabold">${t('settingsTitle')}</h1>
  <div class="card p-5"><h2 class="font-extrabold mb-3">${t('langTitle')}</h2><div class="flex gap-2">${langBtns}</div></div>
  <div class="card p-5"><h2 class="font-extrabold mb-3">${t('chooseCoach')}</h2><div class="grid grid-cols-2 md:grid-cols-4 gap-3">${coachCards}</div></div>
  <div class="card p-5"><h2 class="font-extrabold mb-1">${t('unlockCoach')}</h2><p class="text-sm mb-3" style="color:var(--muted)">${t('balance')}: <b style="color:var(--indigo)">${state.points} ✨</b></p>
   <div class="flex items-center gap-3 p-3 rounded-xl" style="background:#fff7e6"><div class="text-3xl">🪨</div><div class="flex-1"><div class="font-extrabold">${COACHES.rock.name} — ${COACHES.rock.role}</div></div>${state.unlocked.rock?`<span class="pill btn-mint">${t('open_')}</span>`:`<button class="btn btn-coral px-4 py-2 text-sm" onclick="unlockRock()">${ROCK_PRICE} ✨</button>`}</div></div>
  <div class="card p-5"><h2 class="font-extrabold mb-1">${t('aiCoach')}</h2><p class="text-sm" style="color:${(state.apiKey||state.proxyUrl)?'var(--mint)':'var(--coral)'}">${(state.apiKey||state.proxyUrl)?t('aiOn'):t('aiOff')}</p>
   <label class="flex items-center gap-2 mt-3 text-sm cursor-pointer"><input type="checkbox" ${state.allowImages?'checked':''} onchange="toggleImages(this.checked)" style="width:18px;height:18px;accent-color:var(--indigo)"> ${t('allowImg')}</label></div>
  <div class="card p-5"><h2 class="font-extrabold mb-1">${t('profileTest')}</h2>${Object.entries(state.scores).map(([k,v])=>`<div class="flex justify-between py-1 text-sm" style="border-bottom:1px solid var(--line)"><span>${esc(tSphere(k))}</span><b style="color:var(--indigo)">${v} / 4</b></div>`).join('')}<button class="btn btn-ghost w-full py-3 mt-4" onclick="retakeTest()">${t('retake')}</button></div>
  <div class="card p-5"><h2 class="font-extrabold mb-1" style="color:var(--coral)">${t('resetT')}</h2><p class="text-sm mb-3" style="color:var(--muted)">${t('resetSub')}</p><button class="btn px-4 py-3 text-sm" style="background:#ffeceb;color:var(--coral)" onclick="hardReset()">${t('delAll')}</button></div></div>`;
}
function selectCoachSetting(k){state.coach=k;save();renderSettings();renderNav();}
function saveApiKey(){state.apiKey=$('apiKeyInput').value.trim();save();renderSettings();}
function saveProxy(){state.proxyUrl=$('proxyInput').value.trim();save();renderSettings();}
function toggleImages(v){state.allowImages=v;save();}
function unlockRock(){
 if(state.points<ROCK_PRICE){modal(t('notEnough'),t('need')+' '+ROCK_PRICE+' ✨');return;}
 addPoints(-ROCK_PRICE);state.unlocked.rock=true;state.coach='rock';
 const w={ru:`WHOA! 🪨 ${state.profile.name||'друг'}, добро пожаловать в команду! NO DAYS OFF. Let's GO! 💥`,en:`WHOA! 🪨 ${state.profile.name||'friend'}, welcome to the team! NO DAYS OFF. Let's GO! 💥`,zh:`WHOA！🪨 ${state.profile.name||'朋友'}，欢迎加入！NO DAYS OFF。Let's GO！💥`}[state.lang||'ru'];
 state.chat.push({role:'coach',coach:'rock',text:w});
 save();render();
}
function retakeTest(){if(!confirm('OK?'))return;state.onboarded=false;testDraft=null;remember('Пользователь проходит тест заново.');save();render();}
function hardReset(){if(!confirm('OK?'))return;localStorage.removeItem(STORE_KEY);state=defaultState();save();render();}

/* ============================================================ СТАРТ */
load();
if(state.onboarded)touchStreak();
render();
Object.assign(window,{navigate,closeModal,testNext,pickAnswer,finishTest,completeTask,toggleHabit,addHabit,removeHabit,advanceChallenge,completeSleep,sendChat,switchCoach,askImage,selectCoachSetting,saveApiKey,saveProxy,toggleImages,unlockRock,retakeTest,hardReset,startDate,finishDate,startIQ,answerIQ,startInterview,finishInterview,actSend,claimChest,setMood,saveIntention,startWorkout,workoutNext,workoutSkip,setLang,startGratitude,startVisualize,finishSession});
</script>
</body>
</html>
