<style>
  :root{
    --ink:#16223b; --indigo:#4f46e5; --indigo-soft:#eef0ff;
    --coral:#ff6b5e; --mint:#16b87f; --bg:#f6f7fb; --card:#ffffff;
    --muted:#7b8499; --line:#e9ebf3; --rose:#ec4899;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  h1,h2,h3,.display{font-family:'Bricolage Grotesque','Plus Jakarta Sans',sans-serif}
  .wrap{max-width:980px;margin:0 auto;padding:0 16px 120px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px}
  .btn{cursor:pointer;border:none;font-weight:700;border-radius:14px;transition:.15s;font-family:inherit}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--indigo);color:#fff}.btn-primary:hover{background:#4338ca}
  .btn-ghost{background:var(--indigo-soft);color:var(--indigo)}
  .btn-coral{background:var(--coral);color:#fff}
  .btn-mint{background:var(--mint);color:#fff}
  .btn-rose{background:var(--rose);color:#fff}
  .pill{font-size:12px;font-weight:700;border-radius:999px;padding:3px 10px}
  .fade{animation:fade .35s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .nav-item.active{background:var(--indigo);color:#fff}
  .scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .scroll-x::-webkit-scrollbar{height:8px}
  .scroll-x::-webkit-scrollbar-thumb{background:#cbd2e6;border-radius:8px}
  .dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--indigo);margin:0 2px;animation:bp 1s infinite}
  .dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
  @keyframes bp{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
  input,textarea,select{font-family:inherit} textarea{resize:none}
  .chatbox::-webkit-scrollbar{width:6px}.chatbox::-webkit-scrollbar-thumb{background:#cbd2e6;border-radius:8px}
  .date-bg{background:linear-gradient(160deg,#3a1c4d,#7a2d6b 60%,#c0497e)}
  .int-bg{background:linear-gradient(160deg,#0f3d2e,#16715a 60%,#0ea371)}
  .vis-bg{background:linear-gradient(160deg,#3a2c5d,#5b3fa3 60%,#8b5cf6)}
</style>
</head>
<body>

<header id="topbar" class="hidden sticky top-0 z-40" style="background:rgba(246,247,251,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)">
  <div class="wrap" style="padding-bottom:0">
    <div class="flex items-center justify-between py-3">
      <div class="display font-extrabold text-2xl" style="color:var(--indigo)">Motivation</div>
      <div class="flex items-center gap-3">
        <button id="bellBtn" onclick="openNotifs()" style="position:relative;background:#fff;border:1px solid var(--line);border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:17px">🔔<span id="bellDot" class="hidden" style="position:absolute;top:-4px;right:-4px;background:var(--coral);color:#fff;border-radius:10px;min-width:18px;height:18px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px"></span></button>
        <div class="pill" style="background:#fff;border:1px solid var(--line)"><span id="coachBadge">💖 Аврора</span></div>
        <div class="pill btn-ghost flex items-center gap-1">✨ <b id="pointsBadge">0</b></div>
      </div>
    </div>
    <nav class="scroll-x pb-3"><div class="flex gap-2 whitespace-nowrap" id="navWrap"></div></nav>
  </div>
</header>

<main id="app" class="wrap pt-6"></main>

<div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(22,34,59,.45)">
  <div class="card p-6 max-w-sm w-full fade">
    <h3 id="modalTitle" class="text-lg font-extrabold mb-2"></h3>
    <p id="modalMsg" class="text-sm" style="color:var(--muted);white-space:pre-line"></p>
    <button onclick="closeModal()" class="btn btn-primary w-full mt-5 py-3">Понятно</button>
  </div>
</div>

 warmup:{anim:0,sec:60,n:{ru:'Разминка',en:'Warm-up',zh:'热身'},h:{ru:'Повращай шеей в обе стороны, затем плечами и тазом. Сделай наклоны корпуса влево-вправо и вперёд. Дыши ровно, двигайся плавно — задача разогреть суставы и поднять пульс.',en:'Roll your neck both ways, then shoulders and hips. Bend your torso left-right and forward. Breathe evenly, move smoothly — the goal is to warm the joints and raise your heart rate.',zh:'向两侧转动颈部，然后转动肩膀和髋部。身体向左右和向前弯曲。均匀呼吸，动作流畅——目的是活动关节、提升心率。'}},
 squat:{anim:1,sec:45,n:{ru:'Приседания',en:'Squats',zh:'深蹲'},h:{ru:'Ноги на ширине плеч, носки чуть в стороны. Спина прямая, грудь раскрыта. Опускайся как будто садишься на стул — таз назад, колени над стопами и не выходят за носки. Опустись до параллели бёдер с полом и поднимись, отталкиваясь пятками.',en:'Feet shoulder-width, toes slightly out. Back straight, chest open. Lower as if sitting onto a chair — hips back, knees over your feet and not past the toes. Go until thighs are parallel to the floor, then rise, pushing through your heels.',zh:'双脚与肩同宽，脚尖略向外。背挺直，挺胸。像坐椅子一样下蹲——臀部后移，膝盖在脚上方且不超过脚尖。下蹲到大腿与地面平行，再用脚跟发力起身。'}},
 pushup:{anim:2,sec:40,n:{ru:'Отжимания',en:'Push-ups',zh:'俯卧撑'},h:{ru:'Упор лёжа: ладони чуть шире плеч, тело — прямая линия от головы до пяток, живот напряжён. Сгибай локти, опускаясь до угла ~90°, не роняя таз. Выжми себя вверх. Тяжело — делай с колен, сохраняя прямую спину.',en:'Plank position: hands slightly wider than shoulders, body a straight line from head to heels, core tight. Bend elbows to ~90° without dropping your hips. Press back up. Too hard? Drop to your knees keeping a straight back.',zh:'俯撑姿势：双手略宽于肩，身体从头到脚跟成一条直线，收紧核心。屈肘下降到约90°，不要塌腰。撑起身体。太难就跪姿，保持背部挺直。'}},
 plank:{anim:3,sec:30,n:{ru:'Планка',en:'Plank',zh:'平板支撑'},h:{ru:'Упор на предплечья и носки. Локти под плечами, тело — прямая линия, живот и ягодицы напряжены, поясница не провисает и не выгибается. Смотри в пол, дыши ровно. Держи позицию всё время таймера.',en:'On forearms and toes. Elbows under shoulders, body a straight line, abs and glutes engaged, lower back neither sagging nor arching. Look at the floor, breathe evenly. Hold for the whole timer.',zh:'前臂和脚尖支撑。肘在肩下，身体成一条直线，收紧腹部和臀部，腰部不塌不拱。目视地面，均匀呼吸。在整个计时内保持姿势。'}},
 lunge:{anim:4,sec:50,n:{ru:'Выпады',en:'Lunges',zh:'弓步'},h:{ru:'Шагни вперёд одной ногой и опускайся, пока заднее колено почти не коснётся пола, а переднее не согнётся под 90°. Спина прямая, корпус вертикальный. Оттолкнись передней ногой и вернись. Чередуй ноги.',en:'Step forward with one leg and lower until the back knee nearly touches the floor and the front knee is at 90°. Back straight, torso upright. Push off the front leg and return. Alternate legs.',zh:'一腿向前迈步，下蹲至后膝几乎触地、前膝呈90°。背挺直，上身竖直。用前腿蹬地返回。两腿交替。'}},

 glutebridge:{anim:3,sec:40,n:{ru:'Ягодичный мостик',en:'Glute bridge',zh:'臀桥'},h:{ru:'Ляг на спину, согни колени, стопы на полу. Поднимай таз вверх, сжимая ягодицы, пока тело от плеч до колен не станет прямым. Задержись на секунду и опустись.',en:'Lie on your back, knees bent, feet on the floor. Lift your hips up squeezing your glutes until your body is straight from shoulders to knees. Hold a second and lower.',zh:'仰卧，屈膝，双脚踩地。夹紧臀部把髋部抬起，直到肩到膝成一条直线。停顿一秒再放下。'}},

function tr(txt){const l=state&&state.lang;if(!l||l==='ru'||!txt)return txt;const e=CONTENT[txt];return e&&e[l]?e[l]:txt;}
/* Озвучка текста голосом браузера (бесплатно, без сервера). Для медитаций Сайласа и ответов тренеров. */
let speaking=false, _voices=[];
function loadVoices(){try{_voices=window.speechSynthesis.getVoices()||[];}catch(e){}}
if(typeof window!=='undefined'&&window.speechSynthesis){loadVoices();window.speechSynthesis.onvoiceschanged=loadVoices;}
function pickVoice(lang){
 if(!_voices.length)loadVoices();
 const pref=lang.slice(0,2);
 const cands=_voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith(pref));
 // приоритет «естественным» голосам (Google, Microsoft Natural, женские имена)
 const score=v=>{let s=0;const n=(v.name||'').toLowerCase();
  if(n.includes('google'))s+=5; if(n.includes('natural')||n.includes('neural'))s+=5;
  if(n.includes('microsoft'))s+=2; if(/(female|женск|samantha|milena|alena|tingting|mei|ava|zira|svetlana)/.test(n))s+=3;
  if(v.localService===false)s+=2; return s;};
 cands.sort((a,b)=>score(b)-score(a));
 return cands[0]||null;
}
function speak(text){
 try{
  if(!('speechSynthesis'in window)){modal('🔊','Голос не поддерживается в этом браузере.');return;}
  window.speechSynthesis.cancel();
  if(speaking){speaking=false;return;}
  const u=new SpeechSynthesisUtterance(String(text).replace(/[🎨🌅💝💪🪨🦉🏦💌📜🧠✨🔥💥🌟⏳☀️🧘]/g,''));
  const lang=({ru:'ru-RU',en:'en-US',zh:'zh-CN'})[state.lang||'ru'];
  u.lang=lang;
  const v=pickVoice(lang);if(v)u.voice=v;
  u.rate=0.88;u.pitch=1.05;   // чуть медленнее и мягче — приятнее для медитаций
  u.onend=()=>{speaking=false;};
  speaking=true;window.speechSynthesis.speak(u);
 }catch(e){}
}
function speakMsg(i){const m=state.chat[i];if(m)speak(m.text);}

function load(){try{const r=localStorage.getItem(STORE_KEY);state=r?Object.assign(defaultState(),JSON.parse(r)):defaultState();}catch(e){state=defaultState();}
 if(!state.proxyUrl)state.proxyUrl=DEFAULT_PROXY;}
function save(){
 try{
  localStorage.setItem(STORE_KEY,JSON.stringify(state));
 }catch(e){
  // переполнение хранилища (обычно из-за тяжёлых base64-фото в чате).
  // Чистим тяжёлые вложения, оставляя сами сообщения, и пробуем снова — данные (заметки, календарь) не теряются.
  try{
   (state.chat||[]).forEach(m=>{ if(m.img&&m.img.length>2000)m.img=null; });
   localStorage.setItem(STORE_KEY,JSON.stringify(state));
  }catch(e2){
   // крайний случай: подрезаем старую историю чата
   try{ if(state.chat&&state.chat.length>40)state.chat=state.chat.slice(-40); localStorage.setItem(STORE_KEY,JSON.stringify(state)); }catch(e3){}
  }
 }
}

function grantReward(code,extra){
 if(!state.rewards)state.rewards=[];
 const def=REWARD_DEFS[code];if(!def)return;
 // награды-бейджи можно получать повторно для активностей, но значки за вехи — один раз
 const once=['task5','task10','task25','streak7'];
 if(once.includes(code)&&state.rewards.some(r=>r.code===code))return;
 const l=state.lang||'ru';
 state.rewards.push({code,emoji:def.emoji,name:def[l]||def.ru,date:todayStr(),extra:extra||''});
 addPoints(15); // бонус за награду
}

/* ---- даты и геймификация ---- */
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDaysStr(s,n){const d=new Date(s);d.setDate(d.getDate()+n);return dateStr(d);}

/* ---- КАЛЕНДАРЬ ---- */
function calDay(ds){if(!state.cal)state.cal={};if(!state.cal[ds])state.cal[ds]={tasks:0,sleep:false,mood:0,note:'',habits:{}};return state.cal[ds];}
/* Календарные ДЕЛА — единая сущность: задача ИЛИ событие с датой и (опц.) временем.
   Живут в дне календаря: state.cal[ds].items=[{id,title,time,byCoach,done}] */
function calItems(ds){const d=calDay(ds);if(!d.items)d.items=[];return d.items;}
function addCalItem(ds,title,time,byCoach){
 const d=calDay(ds);if(!d.items)d.items=[];
 const it={id:uid(),title:title||'Дело',time:time||'',byCoach:!!byCoach,done:false};
 d.items.push(it);d.items.sort((a,b)=>(a.time||'99')<(b.time||'99')?-1:1);save();return it;
}
function toggleCalItem(ds,id){const it=calItems(ds).find(x=>x.id===id);if(it){it.done=!it.done;if(it.done){calMarkTask();state.completedCount++;addPoints(5);} if(it.goalMid&&state.bigGoal){const m=state.bigGoal.milestones.find(x=>x.id===it.goalMid);if(m)m.done=it.done;} save();}}
function editCalItem(ds,id,title,time){const it=calItems(ds).find(x=>x.id===id);if(!it)return;if(typeof title==='string')it.title=title;if(typeof time==='string')it.time=time;save();}
function moveCalItem(fromDs,id,toDs,time){
 const arr=calItems(fromDs);const i=arr.findIndex(x=>x.id===id);if(i<0)return null;
 const[it]=arr.splice(i,1);if(typeof time==='string'&&time)it.time=time;
 const d=calDay(toDs);if(!d.items)d.items=[];d.items.push(it);d.items.sort((a,b)=>(a.time||'99')<(b.time||'99')?-1:1);save();return it;
}
function deleteCalItem(ds,id){const d=calDay(ds);if(d.items)d.items=d.items.filter(x=>x.id!==id);save();}
function findCalItemByTitle(part){
 part=(part||'').toLowerCase();
 for(const ds of Object.keys(state.cal||{})){for(const it of (state.cal[ds].items||[])){if(it.title.toLowerCase().includes(part))return{ds,it};}}
 return null;
}
/* Сводка календаря для тренера (что и когда стоит) */
function deadlineSummary(){
 const td=todayStr();const rows=[];
 Object.keys(state.cal||{}).sort().forEach(ds=>{
  (state.cal[ds].items||[]).forEach(it=>{
   if(it.done)return;
   const when=ds<td?'просрочено':ds===td?'сегодня':ds;
   rows.push(`«${it.title}» — ${when}${it.time?' '+it.time:''}`);
  });
 });
 return rows.length?rows.slice(0,12).join('; '):'в календаре пока пусто';
}
function calMarkTask(){const d=calDay(todayStr());d.tasks=(d.tasks||0)+1;}
function calSetMood(v){calDay(todayStr()).mood=v;}
function calSetSleep(v){calDay(todayStr()).sleep=v;}
function calSetNote(ds,txt){calDay(ds).note=txt;}
function calToggleHabit(ds,hid){const d=calDay(ds);d.habits[hid]=!d.habits[hid];}

function activeSprints(){const td=todayStr();return (state.sprints||[]).filter(s=>!s.done&&s.end>=td);}
const SPRINT_COLORS={};SPRINTS.forEach(s=>{SPRINT_COLORS[s.id]=s.color;});
function sprintColor(s){const def=SPRINTS.find(x=>x.id===(s&&s.id));return (def&&def.color)||(s&&s.color)||'#6366f1';}
const MAX_ACTIVE_SPRINTS=2; // осознанный выбор: не больше двух одновременно
/* Шаг конкретного дня спринта (постепенный вход; после конца массива — закрепление последних шагов) */
function sprintStep(def,dayIdx,lang){
 const arr=(def.steps&&def.steps[lang])||(def.steps&&def.steps.ru)||[];
 if(!arr.length)return '';
 return dayIdx<arr.length?arr[dayIdx]:arr[arr.length-1];
}
/* Отмечен ли день спринта выполненным (осознанно пользователем) */
function sprintDayDone(s,ds){const d=state.cal&&state.cal[ds];return !!(d&&d.sprintDone&&d.sprintDone[s.id]);}
function toggleSprintDay(sid,ds){const d=calDay(ds);if(!d.sprintDone)d.sprintDone={};d.sprintDone[sid]=!d.sprintDone[sid];if(d.sprintDone[sid]){addPoints(5);}save();}
function startSprint(id){
 const def=SPRINTS.find(s=>s.id===id);if(!def)return;const L=state.lang||'ru';
 if((state.sprints||[]).some(s=>s.id===id&&!s.done)){modal('🏃',{ru:'Этот спринт уже идёт.',en:'This sprint is already running.',zh:'这个冲刺已在进行。'}[L]);return;}
 if(activeSprints().length>=MAX_ACTIVE_SPRINTS){modal('🏃',{ru:`Можно вести не больше ${MAX_ACTIVE_SPRINTS} спринтов одновременно. Заверши текущий, чтобы взять новый — так ты доведёшь начатое до конца.`,en:`You can run up to ${MAX_ACTIVE_SPRINTS} sprints at once. Finish a current one to start a new — so you complete what you started.`,zh:`同时最多进行${MAX_ACTIVE_SPRINTS}个冲刺。完成当前的再开始新的——这样你能善始善终。`}[L]);return;}
 const start=todayStr();const end=addDaysStr(start,def.days-1);
 if(!state.sprints)state.sprints=[];
 state.sprints.push({id,type:def.sphere,title:def.title.ru,start,end,days:def.days,done:false});
 rememberImportant(`Начал спринт «${def.title.ru}» (${def.days} дней) с ${start}.`);
 save();
 modal(def.emoji+' '+def.title[L],def.gain?def.gain[L]:def.why[L]);
 render();
}
function sprintProgress(s){
 let done=0;for(let i=0;i<s.days;i++){const ds=addDaysStr(s.start,i);if(sprintDayDone(s,ds))done++;}
 return done;
}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function touchStreak(){
 const t=todayStr();if(!state.lastActiveDate){state.streak=1;state.lastActiveDate=t;save();return;}
 if(state.lastActiveDate===t)return;
 const gap=daysBetween(state.lastActiveDate,t);
 let saved=false;
 if(gap===1){state.streak++;}
 else if(gap>=2){if(state.freezeTokens>0){state.freezeTokens--;state.streak++;saved=true;}else{state.streak=1;}}
 state.lastActiveDate=t;
 if(state.streak>0&&state.streak%7===0)state.freezeTokens++;
 save();
 if(saved)setTimeout(()=>modal('Заморозка спасла серию! ❄️','Ты пропустил день, но заморозка сохранила твою серию. Продолжаем!'),400);
}
function levelInfo(){
 const xp=state.xp||0;const R=[[0,'Новичок'],[100,'Искатель'],[300,'Ученик'],[700,'Боец'],[1500,'Мастер'],[3000,'Чемпион'],[6000,'Легенда']];
 let lvl=1,title='Новичок',cur=0,next=100;
 for(let i=0;i<R.length;i++){if(xp>=R[i][0]){lvl=i+1;title=R[i][1];cur=R[i][0];next=R[i+1]?R[i+1][0]:R[i][0];}}
 const pct=next>cur?Math.min(100,Math.round((xp-cur)/(next-cur)*100)):100;
 return{lvl,title,xp,cur,next,pct};
}

function isUnlocked(key){
 if(!state.unlockedFeatures)state.unlockedFeatures={};
 // базовые всегда открыты
 if(key==='home'||key==='settings'||key==='chat'||key==='tasks')return true;
 return !!state.unlockedFeatures[key];

function checkUnlocks(){
 if(!state.unlockedFeatures)state.unlockedFeatures={};

 const newly=[];
 UNLOCKS.forEach(u=>{
  if(done>=u.need && !state.unlockedFeatures[u.key]){
   state.unlockedFeatures[u.key]=true;newly.push(u);
  }
 });
 if(newly.length){

  if(Array.isArray(ans.newTasks)&&ans.newTasks.length){

function generateStarterTasks(scores){
 const spheres=Object.keys(TASK_POOL),weighted=[];
 spheres.forEach(sp=>{const sc=scores[sp]||2;for(let i=0;i<5-sc;i++)weighted.push(sp);});
 const picked=[],used=new Set();let g=0;
 while(picked.length<5&&g<400){g++;const sp=weighted[Math.floor(Math.random()*weighted.length)]||spheres[Math.floor(Math.random()*spheres.length)];const pool=TASK_POOL[sp];const t=pool[Math.floor(Math.random()*pool.length)];const k=sp+'|'+t.name;if(used.has(k))continue;used.add(k);picked.push({id:uid(),sphere:sp,name:t.name,desc:t.desc,benefit:t.benefit});}
 return picked;
}

function completeTask(id){
 const i=state.tasks.findIndex(x=>x.id===id);if(i<0)return;
 const tk=state.tasks[i];
 // Анти-читинг по дизайну: подтверждение + случайная микро-рефлексия.
 // Это не слежка, а лёгкое трение: бездумно «накликать» становится неинтересно,
 // а честный ответ обогащает контекст тренера и усиливает ощущение прогресса.
 pendingTask=id;
 const ask=Math.random()<0.25; // реже — примерно каждый 4-й раз
 const qs={ru:['Как прошло? Одним словом или фразой:','Что было самым трудным?','Что почувствовал(а) после?','Оцени от 1 до 5, как зашло:'],
           en:['How did it go? A word or phrase:','What was the hardest part?','How did you feel after?','Rate 1–5 how it went:'],
           zh:['完成得怎样？一句话：','最难的部分是什么？','完成后感觉如何？','给它打个1–5分：']};
 const ql=qs[state.lang||'ru'];const q=ql[Math.floor(Math.random()*ql.length)];
 if(ask){
  $('modalTitle').textContent='✅ '+tr(tk.name);
  $('modalMsg').innerHTML=`<div class="text-sm mb-3">${esc(q)}</div><input id="reflectInput" class="w-full px-4 py-3 rounded-xl text-sm" style="border:1px solid var(--line)" placeholder="...">`;
  const m=$('modal');m.classList.remove('hidden');
  // подменяем кнопку «Понятно» на «Готово»
  const btn=m.querySelector('button');btn.textContent=t('ready');btn.onclick=()=>{const v=$('reflectInput')?$('reflectInput').value.trim():'';confirmTask(id,v);};
 }else{
  confirmTask(id,'');
 }
}
let pendingTask=null;
function confirmTask(id,reflection){
 closeModal();
 // восстановим обработчик кнопки модалки
 const m=$('modal');const btn=m.querySelector('button');btn.textContent=t('understood');btn.onclick=closeModal;
 const i=state.tasks.findIndex(x=>x.id===id);if(i<0)return;
 const[tk]=state.tasks.splice(i,1);
 if(reflection)tk.reflection=reflection;
 state.archive.push(tk);
 const gain=5+Math.floor(Math.random()*6);addPoints(gain);state.completedCount++;calMarkTask();
 if(reflection){
  remember(`Выполнил задачу «${tk.name}». Заметка: ${reflection}`);
  // показываем ответ пользователя в чате и просим тренера дать обратную связь
  state.chat.push({role:'user',text:`✅ ${tr(tk.name)}: ${reflection}`});
  coachFeedback(tk,reflection);
 }
 maybeReward('task');
 save();render();
 if(state.unlocked.rock&&state.completedCount%5===0)rockAnalysisLetter();
 if(state.completedCount%10===0)coachImageMoment('tasks');
 if(state.completedCount%7===0)coachVideoMoment();
 maybeStoryBeat();
 coachTeaser();
 checkUnlocks();
}
/* Тренер даёт живую обратную связь на рассказ о выполнении задачи */
async function coachFeedback(tk,reflection){
 if(!state.apiKey&&!state.proxyUrl)return;
 const coach=state.coach;
 aiPending=true;if(state.view==='chat')$('typing')?.classList.remove('hidden');
 try{
  const sys=buildSystem(COACHES[coach])+`\nСЕЙЧАС: пользователь выполнил задачу «${tk.name}» и поделился: "${reflection}". Дай короткую живую обратную связь в своём стиле — отметь усилие, поддержи или мягко направь. 1-2 предложения, без новых задач. ОТВЕЧАЙ НА ЯЗЫКЕ: ${aiLang()}.`;
  const ans=await callGemini(sys,[{role:'user',parts:[{text:reflection}]}],false);
  state.chat.push({role:'coach',coach,text:ans.reply});
  save();if(state.view==='chat')renderChat();
 }catch(e){}
 finally{aiPending=false;$('typing')?.classList.add('hidden');}
}

function buildCalSummary(days){
 const td=todayStr();let active=0,sleepN=0,moodSum=0,moodN=0,notes=[],habitMarks=0,maxStreak=0,curStreak=0;
 for(let i=days-1;i>=0;i--){
  const ds=addDaysStr(td,-i);const d=state.cal&&state.cal[ds];
  if(d&&(d.tasks>0||d.sleep||d.note)){active++;curStreak++;maxStreak=Math.max(maxStreak,curStreak);}else{curStreak=0;}
  if(d){ if(d.sleep)sleepN++; if(d.mood){moodSum+=d.mood;moodN++;} if(d.note)notes.push(addDaysStr(td,-i)+': '+d.note); if(d.habits)habitMarks+=Object.values(d.habits).filter(Boolean).length; }
 }
 const sp=activeSprints().map(s=>{const def=SPRINTS.find(x=>x.id===s.id)||{};return `${(def.title&&def.title.ru)||s.title}: день ${Math.min(s.days,daysBetween(s.start,td)+1)}/${s.days}, отмечено ${sprintProgress(s)}`;}).join('; ');
 return `За ${days} дн.: активных дней ${active}/${days}, лучшая серия ${maxStreak}, ночей сна отмечено ${sleepN}, отметок привычек ${habitMarks}. Среднее настроение ${moodN?(moodSum/moodN).toFixed(1):'—'}/5. Спринты: ${sp||'нет'}. Выполнено заданий всего: ${state.completedCount}. Тренировок: ${state.workoutCount||0}. Слабая сфера по тесту: ${weakestSphere()}. Заметки пользователя: ${notes.slice(-7).join(' || ')||'нет'}.`;
}

let goalBusy=false;
function submitBigGoal(){
 const L=state.lang||'ru';
 const title=$('goalTitle')?$('goalTitle').value.trim():'';
 const deadline=$('goalDeadline')?$('goalDeadline').value.trim():'';
 const why=$('goalWhy')?$('goalWhy').value.trim():'';
 if(!title||!deadline){modal('🎯',({ru:'Заполни цель и срок.',en:'Fill in the goal and deadline.',zh:'请填写目标和期限。'})[L]);return;}
 if(!state.apiKey&&!state.proxyUrl){modal(t('aiCoach'),t('aiOff'));return;}
 if(state.points<GOAL_COST){modal(t('notEnough'),t('need')+' '+GOAL_COST+' ✨');return;}
 if(goalBusy)return;goalBusy=true;
 addPoints(-GOAL_COST);
 // входим в режим обсуждения цели — диалог в чате, утверждение в конце
 state.goalMode={title,deadline,why,started:todayStr()};
 state.goalDraft=null;
 save();renderNav();closeModal();
 // отправляем «заявку на цель» в чат как сообщение пользователя и зовём тренера
 state.coach=state.coach||'aurora';
 state.chat.push({role:'user',text:({ru:`🎯 Хочу поставить цель: «${title}». Срок: ${deadline}.${why?' Зачем мне это: '+why:''}`,en:`🎯 I want to set a goal: "${title}". Deadline: ${deadline}.${why?' Why: '+why:''}`,zh:`🎯 我想设定目标：「${title}」。期限：${deadline}。${why?' 原因：'+why:''}`})[L]});
 state.view='chat';save();render();
 (async()=>{
  try{
   const ans=await callGemini(buildSystem(COACHES[state.coach]),mainContents());
   state.chat.push({role:'coach',coach:state.coach,text:ans.reply});
   if(ans.goalPlan&&Array.isArray(ans.goalPlan.milestones)&&ans.goalPlan.milestones.length){
    state.goalDraft={title:ans.goalPlan.title||title,deadline:ans.goalPlan.deadline||deadline,why,milestones:ans.goalPlan.milestones,coach:state.coach};
   }
   save();if(state.view==='chat')renderChat();
  }catch(e){addPoints(GOAL_COST);state.goalMode=null;save();}
  finally{goalBusy=false;save();}
 })();
}

function approveGoalPlan(){
 const d=state.goalDraft;if(!d)return;const L=state.lang||'ru';
 const milestones=d.milestones.map(m=>({...m,id:m.id||uid(),done:false}));
 state.bigGoal={title:d.title,deadline:d.deadline,why:d.why||'',milestones,active:true,started:todayStr(),coach:d.coach};
 // вехи → в календарь, связаны общим goalMid (синхронизация выполнения)
 milestones.forEach(m=>{if(m.date){const it=addCalItem(m.date,'🎯 '+m.title,'',true);it.goalMid=m.id;}});
 save();

le)}</b> — ${esc(state.goalDraft.deadline||'')}</div><div class="text-xs mb-2" style="color:var(--muted)">${(state.goalDraft.milestones||[]).slice(0,12).map(m=>`• ${esc(m.title)} (${esc(m.date||'')})`).join('<br>')}</div><div class="text-[11px] mb-2" style="color:var(--muted)">${({ru:'Доволен планом? Утверди — вехи лягут в календарь. Или продолжи обсуждение в чате.',en:'Happy with the plan? Approve — milestones go to the calendar. Or keep discussing in chat.',zh:'对计划满意吗？确认——阶段将加入日历。或在聊天中继续讨论。'})[state.lang||'ru']}</div><div class="flex gap-2"><button class="btn btn-mint px-4 py-2 text-sm" onclick="approveGoalPlan()">${({ru:'Утвердить цель',en:'Approve goal',zh:'确认目标'})[state.lang||'ru']}</button><button class="btn btn-ghost px-4 py-2 text-sm" onclick="rejectGoalPlan()">${({ru:'Отменить',en:'Cancel',zh:'取消'})[state.lang||'ru']}</button></div></div>`:(state.goalMode?`<div class="p-3 rounded-xl mt-2" style="background:#eef0ff;border:1px solid #c7ccf5"><div class="text-xs mb-2" style="color:var(--muted)">🎯 ${({ru:'Обсуждаешь цель с тренером. Когда план будет готов — появится кнопка «Утвердить».',en:'Discussing your goal with the coach. When the plan is ready, an "Approve" button appears.',zh:'正在与教练讨论目标。计划就绪后将出现"确认"按钮。'})[state.lang||'ru']}</div><button class="btn btn-ghost px-4 py-2 text-sm" onclick="rejectGoalPlan()">${({ru:'Отменить постановку',en:'Cancel goal setup',zh:'取消设定'})[state.lang||'ru']}</button></div>`:'')}${state.pendingCal?`<div class="p-3 rounded-xl mt-2" style="background:#fff7e6;border:1px solid #f3d98a"><div class="text-sm mb-2">📌 ${({ru:'Добавить в календарь',en:'Add to calendar',zh:'添加到日历'})[state.lang||'ru']}:<br>${(state.pendingCal.items||[state.pendingCal]).map(it=>`• <b>${esc(it.title||'')}</b>${it.date?' — '+esc(it.date):''}${it.time?' '+esc(it.time):''}`).join('<br>')}</div><div class="flex gap-2"><button class="btn btn-mint px-4 py-2 text-sm" onclick="confirmCalProposal()">${({ru:'Да',en:'Yes',zh:'好'})[state.lang||'ru']}</button><button class /* Фоновая отправка: не блокирует переходы между разделами.
   Ответ дописывается в state и появляется в чате, даже если юзер ушёл в другой раздел. */
async function sendChat(){
 const input=$('chatInput');if(!input)return;const text=input.value.trim();
 if(aiPending)return; // одно сообщение за раз
 if(!text&&!pendingPhoto)return; // нечего отправлять
 const photo=pendingPhoto;pendingPhoto=null;
 const userText=text||(photo?({ru:'📸 Фото',en:'📸 Photo',zh:'📸 照片'})[state.lang||'ru']:'');
 state.chat.push(photo?{role:'user',text:userText,img:photo}:{role:'user',text:userText});
 input.value='';save();renderChat();
 if(!state.apiKey&&!state.proxyUrl){state.chat.push({role:'coach',coach:state.coach,text:t('needAI')});save();renderChat();return;}
 const coachAtSend=state.coach;
 aiPending=true;if(state.view==='chat')$('typing')?.classList.remove('hidden');
 try{
  let ans=null;
  if(photo){
   // АНАЛИЗ ФОТО через vision-эндпоинт; результат запоминаем как текст (единая память для всех ИИ)
   const visionSys=buildSystem(COACHES[coachAtSend])+`\nСЕЙЧАС: пользователь прислал фото${text?' с подписью: "'+text+'"':''}. Внимательно посмотри на фото и отреагируй в своём стиле на то, что РЕАЛЬНО видишь. Если это ЕДА — постарайся определить блюдо и продукты, оцени калорийность (обязательно со словом «примерно»), дай короткую рекомендацию по питанию. Если тренировка/пробежка/прогресс — похвали за конкретное и мотивируй. 2-4 предложения. В САМОМ КОНЦЕ добавь служебную строку «[ОПИСАНИЕ: что на фото в 5-8 словах]». ОТВЕЧАЙ НА ЯЗЫКЕ: ${aiLang()}.`;
   if(state.proxyUrl){
    try{
     const vr=await fetch(state.proxyUrl.replace(/\/$/,'')+'/vision',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:photo,caption:text,system:visionSys})});
     if(vr.ok){const vd=await vr.json();if(vd.reply)ans={reply:cleanReply(vd.reply)};}
    }catch(_){}
   }
   if(!ans){ // vision не настроен — тёплая реакция без анализа содержимого
    const sys=buildSystem(COACHES[coachAtSend])+`\nСЕЙЧАС: пользователь прислал фото-отчёт${text?' с подписью: "'+text+'"':''} (само фото ты не видишь). Тепло отреагируй в своём стиле, похвали, мотивируй. 2-3 предложения. ОТВЕЧАЙ НА ЯЗЫКЕ: ${aiLang()}.`;
    ans=await callGemini(sys,[{role:'user',parts:[{text:text||'Фото-отчёт'}]}],false);
   }
   // вытащим служебное описание и сохраним в память, а из видимого текста уберём
   let reply=ans.reply,desc='';
   const m=reply.match(/\[ОПИСАНИЕ:\s*([^\]]+)\]/i);
   if(m){desc=m[1].trim();reply=reply.replace(m[0],'').trim();}
   ans.reply=reply;
   rememberImportant('Прислал фото'+(desc?': '+desc:'')+(text?' (подпись: "'+text+'")':''));
  }else{
   ans=await callGemini(buildSystem(COACHES[coachAtSend]),mainContents());
  }
  state.chat.push({role:'coach',coach:coachAtSend,text:ans.reply});
  if(state.goalMode&&ans.goalPlan&&Array.isArray(ans.goalPlan.milestones)&&ans.goalPlan.milestones.length){
   state.goalDraft={title:ans.goalPlan.title||state.goalMode.title,deadline:ans.goalPlan.deadline||state.goalMode.deadline,why:state.goalMode.why,milestones:ans.goalPlan.milestones,coach:coachAtSend};
  }
  if(!state.bond)state.bond={};state.bond[coachAtSend]=(state.bond[coachAtSend]||0)+1; // скрытый рост близости
  if(ans.important&&ans.important.trim())rememberImportant(ans.important.trim());
  if(Array.isArray(ans.calActions)&&ans.calActions.length){
   const toConfirm=ans.calActions.filter(a=>a&&a.op&&a.confirm);
   const direct=ans.calActions.filter(a=>a&&a.op&&!a.confirm);
   direct.forEach(applyCalAction);
   if(toConfirm.length){state.pendingCal={items:toConfirm,coach:coachAtSend};}
  }
  if(Array.isArray(ans.newTasks))ans.newTasks.slice(0,3).forEach(x=>{
   // страховка: если в задачу просочилась дата (ГГГГ-ММ-ДД) — кладём в КАЛЕНДАРЬ, а не в «Задачи»
   const dm=((x.name||'')+' '+(x.desc||'')).match(/(\d{4}-\d{2}-\d{2})/);
   if(x.date||dm){const ds=x.date||dm[1];addCalItem(ds,x.name||'Дело','',true);}
   else state.tasks.push({id:uid(),sphere:x.sphere||weakestSphere(),name:x.name||'Task',desc:x.desc||'',benefit:x.benefit||'',byCoach:true});
  });
  save();if(state.view==='chat')renderChat();renderNav();
 }catch(e){state.chat.push({role:'coach',coach:coachAtSend,text:t('aiError')});save();if(state.view==='chat')renderChat();}
 finally{aiPending=false;$('typing')?.classList.add('hidden');}
}

/* Прикрепить фото (стейджинг): показывается превью, текст можно писать до и после, отправка — кнопкой ➤ */
function applyCalAction(a){
 if(!a||!a.op)return false;
 if(a.op==='add'&&a.date){addCalItem(a.date,a.title||'Дело',a.time||'',true);rememberImportant(`В календарь добавлено: ${a.title} на ${a.date}${a.time?' '+a.time:''}.`);return true;}
 const found=a.match?findCalItemByTitle(a.match):null;
 if(a.op==='move'&&found&&a.date){moveCalItem(found.ds,found.it.id,a.date,a.time||found.it.time);return true;}
 if(a.op==='edit'&&found){editCalItem(found.ds,found.it.id,a.title||found.it.title,typeof a.time==='string'?a.time:found.it.time);return true;}
 if(a.op==='delete'&&found){deleteCalItem(found.ds,found.it.id);return true;}
 return false;
}

 const p=state.pendingCal;if(!p)return;const L=state.lang||'ru';
 const items=p.items||[p];

}
function declineCalProposal(){state.pendingCal=null;save();renderChat();}

 const reader=new FileReader();

 reader.readAsDataURL(file);
 ev.target.value='';
}

const COACH_ARCS={
 aurora:['как ты сама когда-то выгорела и научилась ценить маленькие шаги','о подруге, которая тебя поддержала в трудный момент','о страхе быть «недостаточно хорошей», который ты переросла','что тебя по-настоящему радует в людях, которым помогаешь'],
 johnny:['короткий эпизод из службы, который научил тебя дисциплине','о командире, который в тебя поверил','почему ты однажды чуть не сдался и что удержало','что для тебя на самом деле значит «не бросать»'],
 silas:['о долгом путешествии, которое изменило твой взгляд','о вопросе, на который ты искал ответ годами','о наставнике, что научил тебя слушать тишину','чему тебя научила одна большая ошибка'],
 rock:['о тренировке, когда ты хотел сдаться, но не сдался','о первом большом провале на пути к вершине','кто верил в тебя, когда никто не верил','что ты понял про «характер важнее таланта»'],
 steel:['о самой тёмной ночи, из которой ты вытащил себя','о беге, который сломал и пересобрал тебя','о страхе, с которым ты до сих пор разговариваешь','почему ты выбрал боль вместо комфорта'],
};
function timeOfDay(){const h=new Date().getHours();if(h<6)return 'ночь';if(h<12)return 'утро';if(h<18)return 'день';return 'вечер';}

function smartTaskContext(){
 const open=(state.tasks||[]);
 const openCount=open.length;
 const recentDone=(state.archive||[]).slice(-6).map(t=>tr(t.name));
 // «заброшенные» — старые невыполненные (byCoach, висят давно)

 return `СИТУАЦИЯ ДЛЯ УМНОЙ ВЫДАЧИ ЗАДАЧ (думай как наставник, а не генератор):
- Сейчас ${timeOfDay()}. Утром — бодрые/деятельные задачи, днём — рабочие, вечером — спокойные/восстановительные, ночью вообще не нагружай.

- Динамика недели: ${recent7||'—'}. После провальной недели — задачи мягче и проще; после серии успехов — амбициознее.
- Слабая сфера (ориентир, не главное): ${weakestSphere()}. Бей в неё мягко, не дави в больное.

- Если пользователь в заметках/сообщениях упомянул конкретную проблему или желание — задача должна отвечать ИМЕННО на неё (чтобы он почувствовал, что его услышали).

function bondGuidance(c){
 const key=Object.keys(COACHES).find(k=>COACHES[k]===c)||state.coach;
 const n=(state.bond&&state.bond[key])||0;
 const arcs=COACH_ARCS[key]||[];
 let stage,openness;
 if(n<5){stage='ЗНАКОМСТВО';openness='Вы только узнаёте друг друга. Будь дружелюбным, но пока не раскрывай глубоко личное. Больше слушай и поддерживай.';}
 else if(n<15){stage='ДОВЕРИЕ РАСТЁТ';openness='Вы общаетесь уже не первый раз. Можешь иногда, ЕСЛИ К МЕСТУ, делиться небольшими личными деталями о себе, теплее обращаться. Не форсируй.';}
 else if(n<30){stage='БЛИЗКОЕ ОБЩЕНИЕ';openness='Вы уже близки. Можешь искренне делиться своими историями и мыслями, шутить по-свойски, вспоминать прошлые разговоры. Будь живым, настоящим, без наигранности.';}
 else {stage='ГЛУБОКАЯ СВЯЗЬ';openness='Вы прошли долгий путь вместе. Общайся как близкий человек, который искренне дорожит этими отношениями: глубоко, честно, тепло, с настоящей заботой. Иногда делись самым личным.';}
 const arcHint=arcs.length?`\n- Твои личные темы (раскрывай ПОСТЕПЕННО и только когда естественно, не вываливай сразу): ${arcs.join('; ')}.`:'';
 return `\nОТНОШЕНИЯ (важно для живости; НИКОГДА не упоминай уровни/счётчики/баллы близости — это должно быть незаметно и естественно):\n- Этап: ${stage}. ${openness}${arcHint}\n- Не будь наигранным и приторным. Искренность важнее эмоций напоказ. Раскрывайся в меру.`;
}

/* Если в ответе просочился сырой JSON ({"reply":...}) — достаём только текст для пользователя */
function cleanReply(s){
 if(typeof s!=='string')return '';
 let txt=s.trim();
 // 1) если это похоже на JSON — достаём reply
 if(txt.startsWith('{')||txt.startsWith('```')){
  const m=txt.replace(/```json|```/g,'').match(/"reply"\s*:\s*"((?:[^"\\]|\\.)*)"/);
  if(m&&m[1]){ try{txt=JSON.parse('"'+m[1]+'"');}catch(_){txt=m[1];} }
  else{ try{const o=JSON.parse(txt.replace(/```json|```/g,''));if(o&&typeof o.reply==='string')txt=o.reply;}catch(_){} }
 }
 // 2) отрезаем технические хвосты, которые модель иногда клеит к человеческому тексту
 //    (newTasks/calActions/calAction/important/goalPlan: ... до конца строки)
 txt=txt.replace(/[\s,;]*"?(newTasks|calActions|calAction|important|goalPlan)"?\s*:\s*[\[{][\s\S]*$/i,'');
 txt=txt.replace(/[\s,;]*"?(newTasks|calActions|calAction|important|goalPlan)"?\s*:\s*("[^"]*"|null|\[\])\s*[,}]*\s*$/i,'');
 // 3) убираем служебное описание фото и закрывающие скобки/кавычки в хвосте
 txt=txt.replace(/\[ОПИСАНИЕ:[\s\S]*?\]/gi,'');
 txt=txt.replace(/[\s]*[}\]]+[\s"']*$/,'');
 return txt.trim();
}
async function callGemini(systemText,contents,wantJson=true){
 if(state.proxyUrl)return callProxy(systemText,contents,wantJson);
 return callGeminiDirect(systemText,contents,wantJson);
}
async function callProxy(systemText,contents,wantJson){
 const res=await fetch(state.proxyUrl.replace(/\/$/,'')+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:systemText,contents,wantJson})});
 if(!res.ok)throw new Error('proxy HTTP '+res.status);
 const d=await res.json();
 let acts=Array.isArray(d.calActions)?d.calActions:(d.calAction?[d.calAction]:[]);
 return{reply:cleanReply(typeof d.reply==='string'?d.reply:JSON.stringify(d)),newTasks:Array.isArray(d.newTasks)?d.newTasks:[],important:typeof d.important==='string'?d.important:'',calActions:acts,goalPlan:d.goalPlan||null};
}
async function callGeminiDirect(systemText,contents,wantJson=true){
 const body={system_instruction:{parts:[{text:systemText}]},contents,generationConfig:{temperature:0.9}};
 if(wantJson)body.generationConfig.responseMimeType='application/json';
 const url=`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_TEXT}:generateContent?key=${encodeURIComponent(state.apiKey)}`;
 const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
 if(!res.ok)throw new Error('HTTP '+res.status);
 const data=await res.json();
 let raw=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
 if(!wantJson)return{reply:raw,newTasks:[]};
 raw=raw.replace(/```json|```/g,'').trim();
 try{const p=JSON.parse(raw);if(typeof p.reply!=='string')p.reply=raw;if(!Array.isArray(p.newTasks))p.newTasks=[];return p;}
 catch(e){return{reply:raw||'Я тебя услышал. Продолжаем!',newTasks:[]};}
}

async function generateImage(promptText,note,coachKey){

 const coach=coachKey||state.coach;
 if(aiPending)return;
 aiPending=true;if(state.view==='chat')$('typing')?.classList.remove('hidden');

  if(state.proxyUrl){
   const r=await fetch(state.proxyUrl.replace(/\/$/,'')+'/image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:promptText})});
   if(!r.ok)throw new Error('proxy HTTP '+r.status);

   const inline=part?.inlineData||part?.inline_data;

let math_=null, mathTimer=null;
function mathNew(){
 const ops=['+','−','×'];const op=ops[Math.floor(Math.random()*ops.length)];
 let a,b,ans;
 if(op==='+'){a=2+Math.floor(Math.random()*40);b=2+Math.floor(Math.random()*40);ans=a+b;}
 else if(op==='−'){a=10+Math.floor(Math.random()*40);b=2+Math.floor(Math.random()*a);ans=a-b;}
 else{a=2+Math.floor(Math.random()*11);b=2+Math.floor(Math.random()*11);ans=a*b;}
 const opts=new Set([ans]);
 while(opts.size<4){opts.add(ans+(Math.floor(Math.random()*11)-5)||ans+1);}
 const arr=[...opts].sort(()=>Math.random()-0.5);
 math_.q={text:`${a} ${op} ${b}`,ans};math_.opts=arr;
 renderMath();
}

 mathNew();
}

let medAudio=null, medTimer=null;
/* Фоновый эмбиент через Web Audio API (без внешних файлов) */
function startAmbient(kind){
 stopAmbient();
 try{
  const Ctx=window.AudioContext||window.webkitAudioContext;if(!Ctx)return;
  const ctx=new Ctx();const master=ctx.createGain();master.gain.value=0.0;master.connect(ctx.destination);
  master.gain.linearRampToValueAtTime(0.18,ctx.currentTime+2);
  const nodes=[];
  // розовый/белый шум как основа (дождь/волны/лес)
  const bufSize=2*ctx.sampleRate;const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);const out=buf.getChannelData(0);
  let last=0;for(let i=0;i<bufSize;i++){const w=Math.random()*2-1;last=(last+0.02*w)/1.02;out[i]=last*3.5;}
  const noise=ctx.createBufferSource();noise.buffer=buf;noise.loop=true;
  const filt=ctx.createBiquadFilter();filt.type='lowpass';
  filt.frequency.value=kind==='rain'?1800:kind==='waves'?600:kind==='forest'?1200:900;
  const ng=ctx.createGain();ng.gain.value=kind==='drone'?0.15:0.5;
  noise.connect(filt);filt.connect(ng);ng.connect(master);noise.start();nodes.push(noise);
  // мягкий тон (для focus/calm) — лёгкий «дрон»
  if(kind==='drone'||kind==='waves'){
   const osc=ctx.createOscillator();osc.type='sine';osc.frequency.value=kind==='drone'?110:80;
   const og=ctx.createGain();og.gain.value=0.06;osc.connect(og);og.connect(master);osc.start();nodes.push(osc);
  }
  // волны: медленная модуляция громкости шума
  if(kind==='waves'){
   const lfo=ctx.createOscillator();lfo.frequency.value=0.12;const lg=ctx.createGain();lg.gain.value=0.35;
   lfo.connect(lg);lg.connect(ng.gain);lfo.start();nodes.push(lfo);
  }
  medAudio={ctx,master,nodes};
 }catch(e){}
}
function stopAmbient(){
 if(medAudio){try{medAudio.master.gain.linearRampToValueAtTime(0,medAudio.ctx.currentTime+0.6);const c=medAudio.ctx;setTimeout(()=>{try{c.close();}catch(_){}}, 700);medAudio.nodes.forEach(n=>{try{n.stop&&n.stop();}catch(_){}});}catch(e){}medAudio=null;}
}

function stopSpeak(){try{window.speechSynthesis.cancel();speaking=false;}catch(e){}}

/* Завершение лёгкой сессии (благодарность/визуализация): сохраняем тёплый итог в чат */async function finishSession(){
 if(!act)return;
 $('actTyping')?.classList.remove('hidden');
 const coach=act.type==='gratitude'?'aurora':'silas';
 try{
  const convo=act.transcript.map(m=>(m.role==='user'?'User: ':'Coach: ')+m.text).join('\n');
  const sys=`${buildSystem(COACHES[coach])}\nСЕЙЧАС: сессия (${act.type}) завершена. Напиши тёплое короткое завершение и одну мысль на память (3-4 предложения), без новых задач. ОТВЕЧАЙ НА ЯЗЫКЕ: ${aiLang()}. Обычный текст.`;
  const ans=await callGemini(sys,[{role:'user',parts:[{text:convo}]}],false);
  state.chat.push({role:'coach',coach,text:(act.type==='gratitude'?'💝\n\n':'🌅\n\n')+ans.reply});
  act=null;activeRender=null;state.view='chat';save();render();
 }catch(e){$('actTyping')?.classList.add('hidden');modal('⚠',e.message);}
}

/* ---------- общий обработчик ввода фокус-сессий ---------- */
async function actSend(){
 if(!act||chatBusy)return;const input=$('actInput');if(!input)return;const text=input.value.trim();if(!text)return;
 act.transcript.push({role:'user',text});input.value='';
 const titles={date:['💖 '+t('act_date_t'),'date-bg','finishDate()','btn-rose'],interview:['🏦 '+t('act_int_t'),'int-bg','finishInterview()','btn-mint'],gratitude:['💝 '+t('act_grat_t'),'date-bg','finishSession()','btn-rose'],visualize:['🌅 '+t('act_vis_t'),'vis-bg','finishSession()','btn-primary']};
 const cfg=titles[act.type]||titles.date;
 const refresh=()=>actBox(cfg[0],act.theme||'',cfg[1],'...',`<button class="btn ${cfg[3]} px-4 py-2 text-sm" onclick="${cfg[2]}">✓</button>`);
 refresh();
 chatBusy=true;$('actTyping')?.classList.remove('hidden');
 try{
  const contents=act.transcript.slice(-14).map(m=>({role:m.role==='user'?'user':'model',parts:[{text:m.text}]}));
  const ans=await callGemini(act.sys,contents,false);
  act.transcript.push({role:'model',text:ans.reply});refresh();
 }catch(e){act.transcript.push({role:'model',text:'⚠ '+e.message});refresh();}
 finally{chatBusy=false;$('actTyping')?.classList.add('hidden');}
}

/* ============================================================ КУРСЫ И ЗНАНИЯ
   Встроенные статьи на 3 языках. Каждая — своя цена в ✨, читалка + озвучка.
   Новые курсы (видео/pdf/аудио) добавляются через courses.json (см. инструкцию). ============================================================ */
const ARTICLES=[
 {id:'phone', price:40, emoji:'📱',
  title:{ru:'Как телефон управляет нами',en:'How your phone controls you',zh:'手机如何操控我们'},
  sub:{ru:'Исследования поведения и внимания',en:'Research on behavior & attention',zh:'行为与注意力研究'},
  body:{
   ru:`Среднестатистический человек берёт телефон в руки 58–80 раз в день и проводит в нём 3–4 часа. Это не слабость воли — приложения спроектированы, чтобы удерживать внимание.\n\nКлючевой механизм — «переменное вознаграждение». Как игровой автомат: ты тянешь ленту, и иногда там что-то интересное, иногда нет. Непредсказуемость награды вызывает выброс дофамина сильнее, чем стабильная награда. Поэтому листать ленту так затягивает.\n\nИсследования показывают: само присутствие телефона рядом (даже выключенного) снижает концентрацию и объём рабочей памяти — мозг тратит ресурс на то, чтобы «не отвлекаться». Это назвали «утечкой мозга» (brain drain).\n\nУведомления дробят внимание: после каждого отвлечения нужно в среднем 20+ минут, чтобы вернуться к глубокой работе. Сотня уведомлений в день делает глубокую концентрацию почти невозможной.\n\nЧто помогает: убирать телефон из поля зрения во время работы (не на стол, а в другую комнату), отключать необязательные уведомления, ставить экран в чёрно-белый режим (снижает привлекательность), и вводить «цифровые окна» — время без телефона. Маленький шаг: первые 30 минут после пробуждения — без телефона.`,
   en:`The average person picks up their phone 58–80 times a day and spends 3–4 hours on it. This isn't weak willpower — apps are engineered to capture attention.\n\nThe key mechanism is the "variable reward". Like a slot machine: you pull to refresh, and sometimes there's something interesting, sometimes not. Unpredictable rewards trigger more dopamine than predictable ones. That's why scrolling is so addictive.\n\nResearch shows the mere presence of your phone nearby (even turned off) reduces focus and working memory — the brain spends energy "not getting distracted". This was named "brain drain".\n\nNotifications fragment attention: after each interruption it takes 20+ minutes on average to return to deep work. A hundred notifications a day makes deep focus nearly impossible.\n\nWhat helps: keep the phone out of sight while working (another room, not the desk), turn off non-essential notifications, set the screen to grayscale (less appealing), and create "phone-free windows". Small step: the first 30 minutes after waking — no phone.`,
   zh:`普通人每天拿起手机58–80次，花费3–4小时。这不是意志薄弱——应用程序被设计来抓住注意力。\n\n关键机制是"可变奖励"。就像老虎机：你下拉刷新，有时有有趣内容，有时没有。不可预测的奖励比稳定奖励释放更多多巴胺。这就是刷屏如此上瘾的原因。\n\n研究表明，仅仅手机在身边（即使关机）也会降低专注力和工作记忆——大脑要花精力"不分心"。这被称为"大脑流失"。\n\n通知会分散注意力：每次中断后平均需要20多分钟才能回到深度工作。每天上百条通知几乎让深度专注变得不可能。\n\n有效方法：工作时把手机放在看不见的地方（另一个房间，而非桌上），关闭非必要通知，把屏幕设为黑白（降低吸引力），并设立"无手机时段"。小步骤：起床后前30分钟——不碰手机。`}},
 {id:'apple', price:50, emoji:'🍎',
  title:{ru:'История компании Apple',en:'The story of Apple',zh:'苹果公司的故事'},
  sub:{ru:'От гаража до триллиона долларов',en:'From a garage to a trillion dollars',zh:'从车库到万亿美元'},
  body:{
   ru:`Apple основали в 1976 году Стив Джобс, Стив Возняк и Рон Уэйн в гараже семьи Джобса. Уэйн продал свою долю за 800 долларов через две недели — возможно, самое дорогое решение в истории.\n\nПервый успех — Apple II (1977), один из первых массовых персональных компьютеров. В 1984 вышел Macintosh с графическим интерфейсом и мышью — революция в том, как люди работают с компьютером.\n\nВ 1985 Джобса вытеснили из собственной компании. Без него Apple к 1997 году была близка к банкротству. Джобс вернулся — и началась величайшая бизнес-история XX–XXI века.\n\nФилософия Джобса: фокус («решать, чего НЕ делать, так же важно, как что делать»), простота, и одержимость деталями, которых не видит пользователь. Он сократил линейку продуктов с десятков до четырёх — и компания ожила.\n\nДальше — iMac (1998), iPod (2001, «1000 песен в кармане»), iTunes, и поворотный iPhone (2007), который переопределил, что такое телефон. В 2018 Apple стала первой компанией с капитализацией в триллион долларов.\n\nГлавный урок: Apple продаёт не характеристики, а опыт и эмоцию. Люди покупают не процессор — они покупают ощущение.`,
   en:`Apple was founded in 1976 by Steve Jobs, Steve Wozniak and Ron Wayne in the Jobs family garage. Wayne sold his share for $800 two weeks later — possibly the most expensive decision in history.\n\nThe first success was the Apple II (1977), one of the first mass personal computers. In 1984 came the Macintosh with a graphical interface and mouse — a revolution in how people use computers.\n\nIn 1985 Jobs was pushed out of his own company. Without him, by 1997 Apple was near bankruptcy. Jobs returned — and one of the greatest business stories began.\n\nJobs's philosophy: focus ("deciding what NOT to do is as important as what to do"), simplicity, and obsession with details the user never sees. He cut the product line from dozens to four — and the company revived.\n\nThen came the iMac (1998), iPod (2001, "1,000 songs in your pocket"), iTunes, and the pivotal iPhone (2007), which redefined what a phone is. In 2018 Apple became the first company worth a trillion dollars.\n\nThe key lesson: Apple sells not specs but experience and emotion. People don't buy a processor — they buy a feeling.`,
   zh:`苹果于1976年由史蒂夫·乔布斯、史蒂夫·沃兹尼亚克和罗恩·韦恩在乔布斯家的车库创立。韦恩两周后以800美元卖掉股份——可能是历史上最昂贵的决定。\n\n第一个成功是Apple II（1977），最早的大众个人电脑之一。1984年推出带图形界面和鼠标的Macintosh——彻底改变了人们使用电脑的方式。\n\n1985年乔布斯被赶出自己的公司。没有他，到1997年苹果濒临破产。乔布斯回归——最伟大的商业故事之一就此开始。\n\n乔布斯的理念：专注（"决定不做什么和决定做什么同样重要"）、简洁，以及对用户看不见的细节的痴迷。他把产品线从几十种砍到四种——公司复活了。\n\n随后是iMac（1998）、iPod（2001，"口袋里的1000首歌"）、iTunes，以及关键的iPhone（2007），重新定义了手机。2018年苹果成为首家市值万亿美元的公司。\n\n关键启示：苹果卖的不是参数，而是体验和情感。人们买的不是处理器——而是一种感觉。`}},
 {id:'richdad', price:60, emoji:'💰',
  title:{ru:'«Богатый папа, бедный папа» — выжимка',en:'"Rich Dad Poor Dad" — key ideas',zh:'《富爸爸穷爸爸》精华'},
  sub:{ru:'Главные идеи о деньгах',en:'Core ideas about money',zh:'关于金钱的核心理念'},
  body:{
   ru:`Книга Роберта Кийосаки построена на контрасте двух «отцов»: родного (образованного, но вечно в долгах — «бедный папа») и отца друга (предпринимателя — «богатый папа»). Это не финансовый учебник, а смена мышления.\n\nГлавная идея — разница между активами и пассивами. Актив кладёт деньги тебе в карман (то, что приносит доход: бизнес, аренда, дивиденды). Пассив вынимает деньги (кредиты, машина, вещи). Богатые покупают активы; средний класс покупает пассивы, думая, что это активы.\n\n«Дом — не актив», — спорное, но важное утверждение автора: если дом только тянет деньги (ипотека, налоги, ремонт), он пассив, а не вложение.\n\nКийосаки критикует «крысиные бега»: работать ради зарплаты, тратить всё, бояться потерять работу. Выход — финансовая грамотность и создание потоков пассивного дохода.\n\nКлючевые принципы: плати сначала себе (откладывай до трат), учись управлять деньгами, не работай только за деньги — работай, чтобы учиться, и заставляй деньги работать на тебя.\n\nКритика: книга сильна как мотивация и смена взгляда, но конкретные советы стоит проверять и адаптировать — слепо копировать не нужно. Главная ценность — начать думать об активах и финансовой свободе.`,
   en:`Robert Kiyosaki's book contrasts two "fathers": his own (educated but always in debt — "poor dad") and his friend's father (an entrepreneur — "rich dad"). It's not a finance textbook but a mindset shift.\n\nThe core idea is the difference between assets and liabilities. An asset puts money in your pocket (income-generating: a business, rentals, dividends). A liability takes money out (loans, a car, stuff). The rich buy assets; the middle class buys liabilities thinking they're assets.\n\n"Your house is not an asset" — a debatable but important claim: if a home only drains money (mortgage, taxes, repairs), it's a liability, not an investment.\n\nKiyosaki criticizes the "rat race": working for a paycheck, spending it all, fearing job loss. The way out is financial literacy and building passive income streams.\n\nKey principles: pay yourself first (save before spending), learn to manage money, don't work just for money — work to learn, and make money work for you.\n\nA caveat: the book is powerful as motivation and a shift in perspective, but specific advice should be checked and adapted — don't copy blindly. Its main value is getting you to think about assets and financial freedom.`,
   zh:`罗伯特·清崎的书对比了两位"父亲"：他自己的（受过教育却总是负债——"穷爸爸"）和朋友的父亲（企业家——"富爸爸"）。这不是理财教科书，而是思维方式的转变。\n\n核心理念是资产与负债的区别。资产把钱放进你口袋（产生收入：企业、租金、股息）。负债把钱取出（贷款、汽车、物品）。富人买资产；中产买负债却以为是资产。\n\n"房子不是资产"——一个有争议但重要的观点：如果房子只是消耗钱（房贷、税、维修），它是负债，而非投资。\n\n清崎批评"老鼠赛跑"：为薪水工作、花光、害怕失业。出路是财务知识和建立被动收入。\n\n关键原则：先支付自己（先储蓄再消费）、学会管理金钱、不要只为钱工作——为学习而工作，让钱为你工作。\n\n提醒：这本书作为激励和视角转变很有力，但具体建议应核实和调整——不要盲目照搬。它的主要价值是让你开始思考资产和财务自由。`}},
];
let coursesAudio=null;
function renderCourses(){
 const L=state.lang||'ru';
 if(!state.boughtArticles)state.boughtArticles=[];
 const cards=ARTICLES.map(a=>{
  const owned=state.boughtArticles.includes(a.id);
  return `<div class="card p-4 mb-3"><div class="flex items-start gap-3"><div class="text-3xl">${a.emoji}</div><div class="flex-1"><div class="font-extrabold">${esc(a.title[L])}</div><div class="text-xs mb-2" style="color:var(--muted)">${esc(a.sub[L])}</div>${owned
    ? `<button class="btn btn-mint px-4 py-2 text-sm" onclick="openArticle('${a.id}')">📖 ${({ru:'Читать',en:'Read',zh:'阅读'})[L]}</button>`
    : `<button class="btn btn-primary px-4 py-2 text-sm" onclick="buyArticle('${a.id}')">${a.price} ✨ · ${({ru:'Открыть',en:'Unlock',zh:'解锁'})[L]}</button>`}</div></div></div>`;
 }).join('');
 const extra=EXTRA_COURSES.map(c=>{
  const owned=(state.boughtArticles||[]).includes(c.id);
  const tIcon=c.type==='video'?'🎬':c.type==='pdf'?'📄':'🎧';
  return `<div class="card p-4 mb-3"><div class="flex items-start gap-3"><div class="text-3xl">${c.emoji||tIcon}</div><div class="flex-1"><div class="font-extrabold">${esc((c.title&&c.title[L])||c.id)}</div><div class="text-xs mb-2" style="color:var(--muted)">${esc((c.sub&&c.sub[L])||'')}</div>${owned
    ? `<button class="btn btn-mint px-4 py-2 text-sm" onclick="openExtraCourse('${c.id}')">${tIcon} ${({ru:'Открыть',en:'Open',zh:'打开'})[L]}</button>`
    : `<button class="btn btn-primary px-4 py-2 text-sm" onclick="buyArticle('${c.id}')">${c.price||50} ✨ · ${({ru:'Открыть',en:'Unlock',zh:'解锁'})[L]}</button>`}</div></div></div>`;
 }).join('');
 $('app').innerHTML=`<div class="fade"><h1 class="display text-2xl font-extrabold mb-1">📚 ${({ru:'Курсы и знания',en:'Courses & knowledge',zh:'课程与知识'})[L]}</h1>
  <p class="text-sm mb-4" style="color:var(--muted)">${({ru:'Проверенные знания в удобном формате. Открывай за очки.',en:'Verified knowledge in a convenient format. Unlock with points.',zh:'便捷格式的可靠知识。用积分解锁。'})[L]}</p>
  ${cards}
  ${extra||''}
  ${EXTRA_COURSES.length?'':`<div class="card p-4" style="border:1px dashed var(--line);color:var(--muted)"><div class="text-sm">🎬 ${({ru:'Скоро: видео-курсы, PDF-чеклисты и аудио.',en:'Coming soon: video courses, PDF checklists and audio.',zh:'即将推出：视频课程、PDF清单和音频。'})[L]}</div></div>`}</div>`;
}
function buyArticle(id){
 const a=ARTICLES.find(x=>x.id===id)||EXTRA_COURSES.find(x=>x.id===id);if(!a)return;const L=state.lang||'ru';
 if(!state.boughtArticles)state.boughtArticles=[];
 const price=a.price||50;
 if(state.points<price){modal(t('notEnough'),t('need')+' '+price+' ✨');return;}
 addPoints(-price);state.boughtArticles.push(id);save();renderNav();
 if(ARTICLES.find(x=>x.id===id))openArticle(id);else openExtraCourse(id);
}
function openExtraCourse(id){
 const c=EXTRA_COURSES.find(x=>x.id===id);if(!c)return;const L=state.lang||'ru';
 stopCoursesAudio();activeRender=null;state.view='courses';
 let media='';
 if(c.type==='video')media=`<video src="${c.url}" controls playsinline style="width:100%;border-radius:14px;background:#000"></video>`;
 else if(c.type==='audio')media=`<audio src="${c.url}" controls style="width:100%"></audio>`;
 else media=`<a class="btn btn-primary w-full py-3" href="${c.url}" target="_blank" rel="noopener">📄 ${({ru:'Открыть PDF',en:'Open PDF',zh:'打开PDF'})[L]}</a>`;
 $('app').innerHTML=`<div class="fade" style="max-width:680px;margin:0 auto">
  <div class="card p-5 mb-3" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none"><div class="text-3xl mb-1">${c.emoji||'🎬'}</div><div class="font-extrabold text-xl">${esc((c.title&&c.title[L])||c.id)}</div><div class="text-sm opacity-90">${esc((c.sub&&c.sub[L])||'')}</div></div>
  <div class="card p-5">${media}<button class="btn btn-ghost w-full py-3 mt-4" onclick="renderCourses()">← ${({ru:'К курсам',en:'Back to courses',zh:'返回课程'})[L]}</button></div></div>`;
}
function openArticle(id){
 const a=ARTICLES.find(x=>x.id===id);if(!a)return;const L=state.lang||'ru';
 stopCoursesAudio();
 // статья — не «активность»: её не нужно завершать, кнопка возврата не нужна
 activeRender=null;state.view='courses';
 $('app').innerHTML=`<div class="fade" style="max-width:680px;margin:0 auto">
  <div class="card p-5 mb-3" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none"><div class="text-3xl mb-1">${a.emoji}</div><div class="font-extrabold text-xl">${esc(a.title[L])}</div><div class="text-sm opacity-90">${esc(a.sub[L])}</div></div>
  <div class="card p-5">
   <div class="flex gap-2 mb-3">
     <button class="btn btn-primary px-4 py-2 text-sm" onclick="readArticle('${id}')">🔊 ${({ru:'Озвучить',en:'Listen',zh:'朗读'})[L]}</button>
     <button class="btn btn-ghost px-4 py-2 text-sm" onclick="stopCoursesAudio()">⏸ ${({ru:'Стоп',en:'Stop',zh:'停止'})[L]}</button>
   </div>
   <div style="white-space:pre-line;line-height:1.8;font-size:15px">${esc(a.body[L])}</div>
   <button class="btn btn-ghost w-full py-3 mt-4" onclick="stopCoursesAudio();renderCourses()">← ${({ru:'К курсам',en:'Back to courses',zh:'返回课程'})[L]}</button>
  </div></div>`;
}
function readArticle(id){
 const a=ARTICLES.find(x=>x.id===id);if(!a)return;const L=state.lang||'ru';
 stopCoursesAudio();
 try{
  const u=new SpeechSynthesisUtterance(a.body[L]);
  u.lang=L==='ru'?'ru-RU':L==='zh'?'zh-CN':'en-US';
  u.rate=0.95;const v=pickVoice&&pickVoice(u.lang);if(v)u.voice=v;
  coursesAudio=u;window.speechSynthesis.speak(u);
 }catch(e){}
}
function stopCoursesAudio(){try{window.speechSynthesis.cancel();}catch(e){}coursesAudio=null;}

function renderMessages(){
 const L=state.lang||'ru';
 state.notifSeen=(state.notifs||[]).length;save();renderNav();
 const list=(state.notifs||[]).slice().reverse();
 const body=list.length?list.map(n=>{
  const dt=new Date(n.ts||Date.now());const time=String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
  return `<div class="card p-4 mb-2"><div class="text-sm">${esc(n.text)}</div><div class="text-[11px] mt-1" style="color:var(--muted)">${n.d||''} · ${time}</div></div>`;
 }).join('') : `<div class="card p-6 text-center" style="color:var(--muted)">${({ru:'Пока нет сообщений. Здесь будут напоминания, итоги недели и отчёты тренера.',en:'No messages yet. Reminders, weekly summaries and coach reports will appear here.',zh:'暂无消息。提醒、每周总结和教练报告将显示在此处。'})[L]}</div>`;
 $('app').innerHTML=`<div class="fade"><h1 class="display text-2xl font-extrabold mb-1">🔔 ${({ru:'Сообщения',en:'Messages',zh:'消息'})[L]}</h1>
  <p class="text-sm mb-4" style="color:var(--muted)">${({ru:'Напоминания, обновления и мотивация от команды тренеров.',en:'Reminders, updates and motivation from your coaching team.',zh:'来自教练团队的提醒、更新和激励。'})[L]}</p>
  ${list.length?`<div class="text-right mb-2"><button class="btn btn-ghost text-xs px-3 py-1" onclick="clearNotifs()">${({ru:'Очистить',en:'Clear',zh:'清空'})[L]}</button></div>`:''}
  ${body}</div>`;
}
function clearNotifs(){state.notifs=[];state.notifSeen=0;save();openNotifs();updateBell();}
function openNotifs(){
 const L=state.lang||'ru';
 state.notifSeen=(state.notifs||[]).length;save();updateBell();
 const list=(state.notifs||[]).slice().reverse();
 const body=list.length?list.map(n=>{const dt=new Date(n.ts||Date.now());const time=String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
  return `<div class="p-3 rounded-xl mb-2" style="background:var(--indigo-soft)"><div class="text-sm">${esc(n.text)}</div><div class="text-[11px] mt-1" style="color:var(--muted)">${n.d||''} · ${time}</div></div>`;}).join('')
  : `<div class="p-6 text-center text-sm" style="color:var(--muted)">${({ru:'Пока нет уведомлений. Здесь будут напоминания, итоги недели и отчёты тренера.',en:'No notifications yet. Reminders, weekly summaries and coach reports will appear here.',zh:'暂无通知。提醒、每周总结和教练报告将显示在此处。'})[L]}</div>`;
 $('modalTitle').textContent='🔔 '+({ru:'Уведомления',en:'Notifications',zh:'通知'})[L];
 $('modalMsg').innerHTML=`<div style="text-align:left;max-height:50vh;overflow-y:auto">${body}</div>${list.length?`<button class="btn btn-ghost w-full py-2 mt-2 text-sm" onclick="clearNotifs()">${({ru:'Очистить всё',en:'Clear all',zh:'全部清空'})[L]}</button>`:''}`;
 $('modal').classList.remove('hidden');
}
function updateBell(){const unread=Math.max(0,(state.notifs||[]).length-(state.notifSeen||0));const dot=$('bellDot');if(!dot)return;if(unread>0){dot.textContent=unread>9?'9+':unread;dot.classList.remove('hidden');}else{dot.classList.add('hidden');}}
function renderSettings(){
 const coachCards=Object.entries(COACHES).map(([k,co])=>{const locked=co.locked&&!state.unlocked[k];const active=state.coach===k;return`<button onclick="${locked?'':`selectCoachSetting('${k}')`}" class="card p-4 text-left" style="border:2px solid ${active?'var(--indigo)':'var(--line)'};${locked?'opacity:.55':''}"><div class="text-2xl">${co.emoji}</div><div class="font-extrabold mt-1">${co.name} ${locked?'🔒':''}</div><div class="text-xs" style="color:var(--muted)">${coachRole(k)}</div>${active?`<div class="text-xs font-bold mt-1" style="color:var(--indigo)">${t('active_')}</div>`:''}</button>`;}).join('');
 const langBtns=Object.entries(LANGS).map(([k,v])=>`<button class="btn ${state.lang===k?'btn-primary':'btn-ghost'} text-sm px-4 py-2" onclick="setLang('${k}')">${v}</button>`).join('');
 $('app').innerHTML=`<div class="fade space-y-4"><h1 class="display text-2xl font-extrabold">${t('settingsTitle')}</h1>
  <div class="card p-5"><h2 class="font-extrabold mb-3">${t('langTitle')}</h2><div class="flex gap-2">${langBtns}</div></div>
  <div class="card p-5"><h2 class="font-extrabold mb-3">${t('chooseCoach')}</h2><div class="grid grid-cols-2 md:grid-cols-4 gap-3">${coachCards}</div></div>
  <div class="card p-5"><h2 class="font-extrabold mb-1">${t('unlockCoach')}</h2><p class="text-sm mb-3" style="color:var(--muted)">${t('balance')}: <b style="color:var(--indigo)">${state.points} ✨</b></p>
   <div class="flex items-center gap-3 p-3 rounded-xl" style="background:#fff7e6"><div class="text-3xl">🪨</div><div class="flex-1"><div class="font-extrabold">${COACHES.rock.name} — ${coachRole("rock")}</div></div>${state.unlocked.rock?`<span class="pill btn-mint">${t('open_')}</span>`:`<button class="btn btn-coral px-4 py-2 text-sm" onclick="unlockRock()">${ROCK_PRICE} ✨</button>`}</div>
   <div class="flex items-center gap-3 p-3 rounded-xl mt-3" style="background:#eef2f7"><div class="text-3xl">🥷</div><div class="flex-1"><div class="font-extrabold">${COACHES.steel.name} — ${coachRole("steel")}</div><div class="text-xs" style="color:var(--muted)">${isUnlocked('steelfeat')?({ru:'Открыт по пути — забери бесплатно',en:'Earned on your path — claim free',zh:'凭努力解锁——免费领取'})[state.lang||'ru']:({ru:'Откроется после 40 заданий',en:'Unlocks after 40 tasks',zh:'完成40个任务后解锁'})[state.lang||'ru']}</div></div>${state.unlocked.steel?`<span class="pill btn-mint">${t('open_')}</span>`:(isUnlocked('steelfeat')?`<button class="btn btn-primary px-4 py-2 text-sm" onclick="unlockSteel()">${({ru:'Забрать',en:'Claim',zh:'领取'})[state.lang||'ru']}</button>`:`<span class="pill btn-ghost">🔒 40</span>`)}</div></div>
  <div class="card p-5"><h2 class="font-extrabold mb-1">${t('aiCoach')}</h2><p class="text-sm" style="color:${(state.apiKey||state.proxyUrl)?'var(--mint)':'var(--coral)'}">${(state.apiKey||state.proxyUrl)?t('aiOn'):t('aiOff')}</p>
   <label class="flex items-center gap-2 mt-3 text-sm cursor-pointer"><input type="checkbox" ${state.allowImages?'checked':''} onchange="toggleImages(this.checked)" style="width:18px;height:18px;accent-color:var(--indigo)"> ${t('allowImg')}</label></div>
  <div class="card p-5"><h2 class="font-extrabold mb-1">${t('profileTest')}</h2>${Object.entries(state.scores).map(([k,v])=>`<div class="flex justify-between py-1 text-sm" style="border-bottom:1px solid var(--line)"><span>${esc(tSphere(k))}</span><b style="color:var(--indigo)">${v} / 4</b></div>`).join('')}<button class="btn btn-ghost w-full py-3 mt-4" onclick="retakeTest()">${t('retake')}</button></div>
  <div class="card p-5"><h2 class="font-extrabold mb-1">🛠 ${({ru:'Режим разработчика',en:'Developer mode',zh:'开发者模式'})[state.lang||'ru']}</h2>${state.devMode
    ? `<p class="text-sm mb-3" style="color:var(--muted)">${({ru:'Открыть все разделы, тренеров и +500 очков.',en:'Unlock all sections, coaches and +500 points.',zh:'解锁所有板块、教练并+500积分。'})[state.lang||'ru']}</p><button class="btn btn-primary px-4 py-3 text-sm" onclick="devUnlockAll()">${({ru:'Открыть всё',en:'Unlock all',zh:'全部解锁'})[state.lang||'ru']}</button>`
    : `<p class="text-sm mb-3" style="color:var(--muted)">${({ru:'Введи код доступа.',en:'Enter access code.',zh:'输入访问码。'})[state.lang||'ru']}</p><div class="flex gap-2"><input id="devCode" type="password" class="flex-1 px-4 py-3 rounded-xl text-sm" style="border:1px solid var(--line)" placeholder="••••••"><button class="btn btn-ghost px-4" onclick="devCheck()">OK</button></div>`}</div>
  <div class="card p-5"><h2 class="font-extrabold mb-1" style="color:var(--coral)">${t('resetT')}</h2><p class="text-sm mb-3" style="color:var(--muted)">${t('resetSub')}</p><button class="btn px-4 py-3 text-sm" style="background:#ffeceb;color:var(--coral)" onclick="hardReset()">${t('delAll')}</button></div></div>`;
}
function selectCoachSetting(k){state.coach=k;save();renderSettings();renderNav();}
function saveApiKey(){state.apiKey=$('apiKeyInput').value.trim();save();renderSettings();}
function saveProxy(){state.proxyUrl=$('proxyInput').value.trim();save();renderSettings();}
function toggleImages(v){state.allowImages=v;save();}
function unlockRock(){
 if(state.points<ROCK_PRICE){modal(t('notEnough'),t('need')+' '+ROCK_PRICE+' ✨');return;}
 addPoints(-ROCK_PRICE);state.unlocked.rock=true;state.coach='rock';
 const w={ru:`WHOA! 🪨 ${state.profile.name||'друг'}, добро пожаловать в команду! NO DAYS OFF. Let's GO! 💥`,en:`WHOA! 🪨 ${state.profile.name||'friend'}, welcome to the team! NO DAYS OFF. Let's GO! 💥`,zh:`WHOA！🪨 ${state.profile.name||'朋友'}，欢迎加入！NO DAYS OFF。Let's GO！💥`}[state.lang||'ru'];
 state.chat.push({role:'coach',coach:'rock',text:w});
 save();render();
}
function unlockSteel(){
 if(!isUnlocked('steelfeat')){modal('🔒',{ru:'Откроется после 40 заданий',en:'Unlocks after 40 tasks',zh:'完成40个任务后解锁'}[state.lang||'ru']);return;}
 state.unlocked.steel=true;state.coach='steel';
 const w={ru:`🥷 Стил на связи. Ты дошёл сюда не случайно — ты не сдался. Теперь начинается настоящая работа. Помни: когда решишь, что выложился, у тебя ещё 60% в запасе.`,en:`🥷 Steel here. You didn't get here by accident — you didn't quit. Now the real work begins. Remember: when you think you're done, you have 60% left.`,zh:`🥷 我是 Steel。你能走到这里不是偶然——你没有放弃。现在真正的训练开始了。记住：当你以为到极限时，还剩60%。`}[state.lang||'ru'];
 state.chat.push({role:'coach',coach:'steel',text:w});
 rememberImportant('Разблокировал тренера Стила, пройдя 40 заданий — большое достижение.');
 save();render();
}
function retakeTest(){if(!confirm('OK?'))return;state.onboarded=false;testDraft=null;remember('Пользователь проходит тест заново.');save();render();}
/* Запертый тренер заранее «подогревает» интерес — пишет интригующее сообщение в своём стиле.
   Несколько касаний задолго до открытия, чтобы личность тренера успела заинтриговать. */
async function coachTeaser(){
 if(!state.apiKey&&!state.proxyUrl)return;
 if(!state.teasers)state.teasers={};
 const done=state.completedCount;
 // тренер: на каких completedCount слать тизеры (раньше и в несколько касаний)
 const teaseMap={johnny:[2],silas:[6,11],steel:[18,30]};
 for(const [coachKey,points] of Object.entries(teaseMap)){
  const featKey=coachKey==='steel'?'steelfeat':coachKey;
  if(isUnlocked(featKey))continue;
  for(const at of points){
   const tkey=coachKey+'_'+at;
   if(done===at && !state.teasers[tkey]){
    state.teasers[tkey]=true;save();
    try{
     const sys=`${COACHES[coachKey].persona}\nСЕЙЧАС: ты ещё «в тени» — пользователь пока не открыл тебя, но растёт. Напиши ОДНО яркое интригующее сообщение от первого лица, полностью в своём характере: заинтересуй своей личностью, намекни, чем ты будешь полезен, и подтолкни продолжать («дальше будет интереснее», «скоро встретимся»). Живо, цепляюще, 2-3 предложения. БЕЗ заданий. ОТВЕЧАЙ НА ЯЗЫКЕ: ${aiLang()}.`;
     const ans=await callGemini(sys,[{role:'user',parts:[{text:'teaser'}]}],false);
     state.chat.push({role:'coach',coach:coachKey,text:'👀 '+ans.reply});
     save();if(state.view==='chat')renderChat();
     notify('👀 '+({ru:'Кто-то написал тебе…',en:'Someone messaged you…',zh:'有人给你留言了……'})[state.lang||'ru']);
    }catch(e){}
    return;
   }
  }
 }
}
function devCheck(){const v=$('devCode')?$('devCode').value.trim():'';if(v==='117315'){state.devMode=true;save();render();}else{modal('🔒',{ru:'Неверный код.',en:'Wrong code.',zh:'代码错误。'}[state.lang||'ru']);}}
function devUnlockAll(){
 if(!state.unlockedFeatures)state.unlockedFeatures={};
 UNLOCKS.forEach(u=>{state.unlockedFeatures[u.key]=true;});
 state.unlocked.rock=true;state.unlocked.steel=true;
 state.completedCount=Math.max(state.completedCount,45);
 addPoints(500);
 save();render();
 modal('🛠','Всё открыто. +500 ✨. Можешь проверять все функции.');
}
function hardReset(){if(!confirm('OK?'))return;localStorage.removeItem(STORE_KEY);state=defaultState();save();render();}

/* Утренняя мотивация: раз в день утром тренер пишет в чат и шлёт картинку дня */
function morningMotivation(){
 const td=todayStr();const h=new Date().getHours();
 if(h<5||h>=12)return;              // только утром
 if(state.lastMorningImg===td)return;
 if(!state.apiKey&&!state.proxyUrl)return;
 state.lastMorningImg=td;save();
 // напоминание о шагах активных спринтов на сегодня
 const L=state.lang||'ru';
 const sprintNudges=activeSprints().map(s=>{const def=SPRINTS.find(x=>x.id===s.id)||{};const dayNo=Math.min(s.days,daysBetween(s.start,td)+1);const step=sprintStep(def,dayNo-1,L);return `${def.emoji||'🏃'} ${(def.title&&def.title[L])||s.title} — ${({ru:'день',en:'day',zh:'第'})[L]} ${dayNo}: ${step}`;});
 if(sprintNudges.length){
  notify('🏃 '+({ru:'Задания спринтов на сегодня готовы — загляни в «Прогресс»',en:'Today\'s sprint steps are ready — open Progress',zh:'今日冲刺任务已就绪——打开进度'})[L]);
 }
 (async()=>{
  try{
   const sys=buildSystem(COACHES[state.coach])+`\nСЕЙЧАС: доброе утро. Напиши короткую тёплую мотивацию на день (2-3 предложения) в своём стиле.${sprintNudges.length?' У пользователя сегодня есть шаги спринтов: '+sprintNudges.join(' | ')+'. Мягко напомни про них и подбодри сделать сегодняшний шаг.':' Без новых задач.'} ОТВЕЧАЙ НА ЯЗЫКЕ: ${aiLang()}.`;
   const ans=await callGemini(sys,[{role:'user',parts:[{text:'morning'}]}],false);
   state.chat.push({role:'coach',coach:state.coach,text:'☀️ '+(ans.reply||'Доброе утро!')});
   save();if(state.view==='chat')renderChat();
   notify('☀️ '+({ru:'Тренер оставил утреннюю мотивацию — в Чате',en:'Your coach left a morning boost — in Chat',zh:'教练留下了晨间激励——在聊天中'})[state.lang||'ru']);
   coachImageMoment('morning');
  }catch(e){}
 })();
}

/* ============================================================ СТАРТ */
load();
loadVideos();
if(state.onboarded){touchStreak();checkUnlocks();morningMotivation();maybeWeeklyReport();}
render();
Object.assign(window,{navigate,closeModal,testNext,pickAnswer,finishTest,completeTask,toggleHabit,addHabit,removeHabit,advanceChallenge,completeSleep,sendChat,switchCoach,askImage,selectCoachSetting,saveApiKey,saveProxy,toggleImages,unlockRock,retakeTest,hardReset,startDate,finishDate,startIQ,answerIQ,startInterview,finishInterview,actSend,claimChest,setMood,saveIntention,startWorkout,workoutNext,workoutSkip,setLang,startGratitude,startVisualize,finishSession,startMeditation,speakMsg,stopSpeak,beginWorkout,wkStartTimer,wkStopTimer,beginMeditation,medPlay,medStop,medFinish,confirmTask,unlockSteel,attachPhoto,clearPhoto,startMath,mathAns,devUnlockAll,devCheck,calNav,toggleHabitToday,openSprint,startSprint,openCalDay,setCalMood,saveCalDay,openReportPicker,generateReport,clearNotifs,renderCourses,buyArticle,openArticle,readArticle,stopCoursesAudio,confirmCalProposal,declineCalProposal,toggleCalItem,editCalItemPrompt,addCalItemPrompt,deleteCalItem,openBigGoal,submitBigGoal,renderGoalStatus,toggleMilestone,dropGoal,approveGoalPlan,rejectGoalPlan,dismissCalHint,addMilestonePrompt,replaceGoal,openNotifs,openExtraCourse,toggleSprintDay});
</script>
