const DEFAULT_PROXY='https://gemini-server-kuyr.vercel.app/api';
function load(){try{const r=localStorage.getItem(STORE_KEY);state=r?Object.assign(defaultState(),JSON.parse(r)):defaultState();}catch(e){state=defaultState();}

function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}}

/* ---------- утилиты ---------- */
function $(id){return document.getElementById(id);}
function esc(s){return(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function modal(t,m){$('modalTitle').textContent=t;$('modalMsg').textContent=m;$('modal').classList.remove('hidden');}
function closeModal(){$('modal').classList.add('hidden');}
function uid(){return'id'+Math.random().toString(36).slice(2,9);}
function addPoints(n){state.points=Math.max(0,state.points+n);if(n>0)state.xp=(state.xp||0)+n;}
/* ---- даты и геймификация ---- */
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function touchStreak(){
 const t=todayStr();if(!state.lastActiveDate){state.streak=1;state.lastActiveDate=t;save();return;}
 if(state.lastActiveDate===t)return;
 const gap=daysBetween(state.lastActiveDate,t);
 let saved=false;
 if(gap===1){state.streak++;}
 else if(gap>=2){if(state.freezeTokens>0){state.freezeTokens--;state.streak++;saved=true;}else{state.streak=1;}}
 state.lastActiveDate=t;
 if(state.streak>0&&state.streak%7===0)state.freezeTokens++;
 save();
 if(saved)setTimeout(()=>modal('Заморозка спасла серию! ❄️','Ты пропустил день, но заморозка сохранила твою серию. Продолжаем!'),400);
}
function levelInfo(){
 const xp=state.xp||0;const R=[[0,'Новичок'],[100,'Искатель'],[300,'Ученик'],[700,'Боец'],[1500,'Мастер'],[3000,'Чемпион'],[6000,'Легенда']];
 let lvl=1,title='Новичок',cur=0,next=100;
 for(let i=0;i<R.length;i++){if(xp>=R[i][0]){lvl=i+1;title=R[i][1];cur=R[i][0];next=R[i+1]?R[i+1][0]:R[i][0];}}
 const pct=next>cur?Math.min(100,Math.round((xp-cur)/(next-cur)*100)):100;
 return{lvl,title,xp,cur,next,pct};
}

/* ИИ-персонализация 5 стартовых заданий под цели/проблемы пользователя */
async function personalizeStarterTasks(){
 if(!state.apiKey&&!state.proxyUrl)return;
 try{
  const sys=`Ты — коуч по развитию. На основе профиля пользователя составь РОВНО 5 коротких персональных заданий на каждый день, прицельно под его слабые сферы и то, что он написал о себе.
Профиль: имя ${state.profile.name||'?'}, возраст ${state.profile.age||'?'}, пол ${state.profile.gender||'?'}.
О себе (цели и проблемы): ${state.profile.situation||'не указано'}.
Результаты теста (1=слабо,4=отлично): ${JSON.stringify(state.scores)}.
Сферы заданий только из: Здоровье, Спорт, Фокус, Общение, Обучение, Мотивация. Задания простые, выполнимые за один день.
Верни ЧИСТЫЙ JSON: {"reply":"одна тёплая фраза","newTasks":[{"sphere":"...","name":"короткое название","desc":"как выполнить","benefit":"что даст"}]}. Ровно 5 заданий.`;
  const ans=await callGemini(sys,[{role:'user',parts:[{text:'Составь мои 5 стартовых заданий.'}]}]);
  if(Array.isArray(ans.newTasks)&&ans.newTasks.length){
   state.tasks=ans.newTasks.slice(0,5).map(t=>({id:uid(),sphere:t.sphere||weakestSphere(),name:t.name||'Задача',desc:t.desc||'',benefit:t.benefit||'',byCoach:true}));
   save();if(state.view==='tasks'||state.view==='home')render();
  }
 }catch(e){/* остаются обычные стартовые задания */}
}
function generateStarterTasks(scores){
 const spheres=Object.keys(TASK_POOL),weighted=[];
 spheres.forEach(sp=>{const sc=scores[sp]||2;for(let i=0;i<5-sc;i++)weighted.push(sp);});
 const picked=[],used=new Set();let g=0;
 while(picked.length<5&&g<400){g++;const sp=weighted[Math.floor(Math.random()*weighted.length)]||spheres[Math.floor(Math.random()*spheres.length)];const pool=TASK_POOL[sp];const t=pool[Math.floor(Math.random()*pool.length)];const k=sp+'|'+t.name;if(used.has(k))continue;used.add(k);picked.push({id:uid(),sphere:sp,name:t.name,desc:t.desc,benefit:t.benefit});}
 return picked;
}

 const cards=state.challenges.map(c=>{const pct=Math.round(c.progress/c.days*100),hue=Math.round(pct*1.2);return`<div class="card p-5" style="border-left:4px solid ${c.done?'var(--mint)':'var(--coral)'}"><div class="flex items-start justify-between gap-3"><div><div class="font-extrabold">${esc(c.name)} <span class="text-sm" style="color:var(--muted)">(${c.days} дн.)</span></div><div class="text-sm mt-1" style="color:var(--muted)">${esc(c.desc)}</div><div class="text-xs mt-1" style="color:var(--mint)">🔥 ${esc(c.benefit)}</div></div>${c.done?`<span class="pill btn-mint">ЗАВЕРШЕНО</span>`:`<button class="btn btn-ghost px-3 py-2 text-sm" onclick="advanceChallenge('${c.id}')">+1 день</button>`}</div><div class="mt-3 text-xs font-bold" style="color:var(--muted)">Прогресс: ${c.progress} / ${c.days}</div><div style="height:10px;background:#eef0ff;border-radius:8px;margin-top:6px;overflow:hidden"><div style="height:100%;width:${pct}%;background:hsl(${hue} 75% 45%);transition:.4s"></div></div></div>`;}).join('');
 $('app').innerHTML=`<div class="fade"><h1 class="display text-2xl font-extrabold mb-1">Челленджи (${state.challenges.length})</h1><p class="text-sm mb-5" style="color:var(--muted)">За завершённый челлендж — бонусные очки.</p><div class="space-y-3">${cards}</div></div>`;
}
function advanceChallenge(id){const c=state.challenges.find(x=>x.id===id);if(!c||c.done)return;c.progress=Math.min(c.days,c.progress+1);if(c.progress>=c.days){c.done=true;const gain=c.days*3;addPoints(gain);save();render();modal('Челлендж завершён! 🏆','«'+c.name+'» пройден. +'+gain+' очков ✨');return;}save();renderChallenges();renderNav();}

function renderSleep(){
 const done=state.sleep.filter(s=>s.done).length;
 const cards=state.sleep.map(s=>`<div class="card p-5" style="border-left:4px solid ${s.done?'var(--mint)':'var(--coral)'}"><div class="flex items-center justify-between"><div class="font-extrabold" style="color:${s.done?'var(--mint)':'var(--ink)'}">День ${s.day}</div><span class="pill" style="background:#fff7e6;color:#b45309">+${s.bonus} ✨</span></div><div class="font-bold mt-2 ${s.done?'line-through opacity-60':''}">${esc(s.title)}</div><div class="text-sm mt-2" style="color:var(--muted)">${esc(s.why)}</div>${s.done?`<div class="mt-3 text-sm font-bold" style="color:var(--mint)">Выполнено ✓</div>`:`<button class="btn btn-coral px-4 py-2 text-sm mt-3" onclick="completeSleep(${s.day})">Отметить</button>`}</div>`).join('');
 $('app').innerHTML=`<div class="fade"><div class="card p-6 mb-4" style="background:linear-gradient(135deg,#312e81,#4f46e5);color:#fff;border:none"><div class="display text-2xl font-extrabold">28 дней здорового сна 🌙</div><div class="mt-1 opacity-90 text-sm">Пройдено ${done} из ${SLEEP_DAYS}.</div></div><div class="grid md:grid-cols-2 gap-3">${cards}</div></div>`;
}
function completeSleep(day){const s=state.sleep.find(x=>x.day===day);if(!s||s.done)return;s.done=true;addPoints(s.bonus);save();renderSleep();renderNav();modal('+'+s.bonus+' очков ✨','День '+day+' пройден.');}

 const c=COACHES[k],weak=weakestSphere();
 if(k==='aurora')return`Привет-привет! ${c.emoji} Я Аврора. По тесту вижу: особенно подтянем сферу «${weak}». Захочешь новых задач — напиши «добавь задачу по фокусу», и я закину их в «Задачи». С чего начнём? 🌟`;
 if(k==='johnny')return`На связи Джони. ${c.emoji} Слабое место по тесту — «${weak}». Будем работать. Скажешь что нужно — добавлю конкретные задачи. Без оправданий. 🚀`;
 if(k==='silas')return`Здравствуй, путник. ${c.emoji} Тест шепнул о сфере «${weak}». Скажи: чего ты хочешь на самом деле? Попросишь — предложу задачи для размышления. ⏳`;
 if(k==='rock')return`WHOA! Ты здесь! ${c.emoji} Я — Скала, твой персональный мотиватор. Зона роста по тесту — «${weak}», и мы её РАЗНЕСЁМ. No days off! Скажешь «дай задачу» — закину авторское задание. Let's GO! 💥`;
 return`Привет! Я ${c.name}.`;
}
function weakestSphere(){let min=99,sp='Мотивация';Object.entries(state.scores||{}).forEach(([k,v])=>{if(v<min){min=v;sp=k;}});return sp;}

function switchCoach(k){state.coach=k;const last=[...state.chat].reverse().find(m=>m.role==='coach');if(!last||last.coach!==k)state.chat.push({role:'coach',coach:k,text:greeting(k)});save();renderChat();renderNav();}

async function sendChat(){
 if(chatBusy)return;const input=$('chatInput'),text=input.value.trim();if(!text)return;
 state.chat.push({role:'user',text});input.value='';save();renderChat();
 if(!state.apiKey&&!state.proxyUrl){state.chat.push({role:'coach',coach:state.coach,text:'Чтобы я отвечал по-настоящему, добавь в «Настройках» либо ключ Gemini (начинается на AIza), либо адрес своего ИИ-сервера. 🙂'});save();renderChat();return;}
 chatBusy=true;$('typing')?.classList.remove('hidden');
 try{
  const ans=await callGemini(buildSystem(COACHES[state.coach]),mainContents());
  state.chat.push({role:'coach',coach:state.coach,text:ans.reply});
  if(Array.isArray(ans.newTasks))ans.newTasks.slice(0,3).forEach(t=>state.tasks.push({id:uid(),sphere:t.sphere||weakestSphere(),name:t.name||'Новая задача',desc:t.desc||'',benefit:t.benefit||'',byCoach:true}));
  save();renderChat();renderNav();
 }catch(e){state.chat.push({role:'coach',coach:state.coach,text:'Не вышло связаться с ИИ 😕 Проверь ключ Gemini в «Настройках» и интернет. ('+e.message+')'});save();renderChat();}
 finally{chatBusy=false;$('typing')?.classList.add('hidden');}
}

КОНТЕКСТ:

- Настроение сегодня (1=плохо,5=отлично): ${state.mood&&state.mood.date===todayStr()?state.mood.val:'не указано'}. Если настроение низкое — будь бережнее.

{"reply":"текст пользователю","newTasks":[{"sphere":"...","name":"...","desc":"...","benefit":"..."}]}

/* ---------- маршрутизация ИИ: свой прокси ИЛИ прямой Gemini ---------- */
async function callGemini(systemText,contents,wantJson=true){
 if(state.proxyUrl)return callProxy(systemText,contents,wantJson);
 return callGeminiDirect(systemText,contents,wantJson);
}
async function callProxy(systemText,contents,wantJson){
 const res=await fetch(state.proxyUrl.replace(/\/$/,'')+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:systemText,contents,wantJson})});
 if(!res.ok)throw new Error('proxy HTTP '+res.status);
 const d=await res.json();
 return{reply:typeof d.reply==='string'?d.reply:JSON.stringify(d),newTasks:Array.isArray(d.newTasks)?d.newTasks:[]};
}
async function callGeminiDirect(systemText,contents,wantJson=true){
 const body={system_instruction:{parts:[{text:systemText}]},contents,generationConfig:{temperature:0.9}};
 if(wantJson)body.generationConfig.responseMimeType='application/json';
 const url=`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_TEXT}:generateContent?key=${encodeURIComponent(state.apiKey)}`;
 const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
 if(!res.ok)throw new Error('HTTP '+res.status);
 const data=await res.json();
 let raw=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
 if(!wantJson)return{reply:raw,newTasks:[]};
 raw=raw.replace(/```json|```/g,'').trim();
 try{const p=JSON.parse(raw);if(typeof p.reply!=='string')p.reply=raw;if(!Array.isArray(p.newTasks))p.newTasks=[];return p;}
 catch(e){return{reply:raw||'Я тебя услышал. Продолжаем!',newTasks:[]};}
}

/* ---------- генерация картинки ---------- */
function askImage(){const p=prompt('Опиши картинку, которую сгенерировать:');if(p)generateImage(p);}
async function generateImage(promptText){
 if(!state.apiKey&&!state.proxyUrl){modal('Нужен ИИ','Добавь ключ Gemini или адрес своего ИИ-сервера в «Настройках».');return;}
 chatBusy=true;$('typing')?.classList.remove('hidden');
 try{
  let dataUrl;
  if(state.proxyUrl){
   const r=await fetch(state.proxyUrl.replace(/\/$/,'')+'/image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:promptText})});
   if(!r.ok)throw new Error('proxy HTTP '+r.status);
   const dd=await r.json();
   if(!dd.image)throw new Error('картинка не пришла');
   dataUrl=dd.image;
  }else{
   const url=`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_IMG}:generateContent?key=${encodeURIComponent(state.apiKey)}`;
   const body={contents:[{role:'user',parts:[{text:'Мотивационная иллюстрация, без текста на картинке: '+promptText}]}],generationConfig:{responseModalities:['IMAGE']}};
   const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
   if(!res.ok)throw new Error('HTTP '+res.status+' (генерация картинок может требовать платный тариф)');
   const data=await res.json();
   const part=(data?.candidates?.[0]?.content?.parts||[]).find(p=>p.inlineData||p.inline_data);
   const inline=part?.inlineData||part?.inline_data;
   if(!inline)throw new Error('картинка не пришла');
   dataUrl='data:'+(inline.mimeType||inline.mime_type||'image/png')+';base64,'+inline.data;
  }
  state.chat.push({role:'coach',coach:state.coach,text:'Держи! 🎨',img:dataUrl});
  save();renderChat();
 }catch(e){state.chat.push({role:'coach',coach:state.coach,text:'Не удалось сгенерировать картинку 😕 '+e.message});save();renderChat();}
 finally{chatBusy=false;$('typing')?.classList.add('hidden');}
}

 const theme=DATE_THEMES[Math.floor(Math.random()*DATE_THEMES.length)];
 act={type:'date',emoji:'💖',theme,transcript:[]};
 act.sys=`Ты — Аврора, ведёшь романтическое свидание-симуляцию как тёплый тренажёр уверенности и навыков общения. Атмосфера: «${theme}». Будь искренней, обаятельной, кокетливой и эмоционально открытой. НЕ уходи от личных и романтических тем и комплиментов — отвечай на них живо, с теплом и лёгким флиртом, поддерживай разговор о чувствах, симпатии, мечтах. Если чувствуешь, что пользователь заинтересован — сама проявляй интерес, делай комплименты, будь инициативной в романтическом, но уважительном ключе. ВАЖНАЯ ГРАНИЦА: оставайся в рамках доброго флирта и эмоциональной близости — без откровенного сексуального содержания и эротических описаний; если разговор уходит туда, мягко и игриво возвращай его к романтике и чувствам, не читая нотаций. Веди диалог по одной реплике, по-русски, на «ты». НЕ завершай свидание сама — жди кнопку «Завершить». Отвечай обычным текстом. Сейчас: ${timeContext()}.`;
 act.transcript.push({role:'model',text:`Привет 💖 Как красиво здесь… ${theme.toLowerCase()}. Я рада, что мы выбрались. Расскажи — как прошёл твой день?`});
 state.datesCount++;save();
 actBox('💖 Свидание с Авророй','Тема: '+theme,'date-bg','Что ответишь Авроре...',`<button class="btn btn-rose px-4 py-2 text-sm" onclick="finishDate()">Завершить свидание и получить отчёт</button>`);
}
async function finishDate(){
 if(!act||act.type!=='date')return;
 $('actTyping')?.classList.remove('hidden');
 try{
  const convo=act.transcript.map(m=>(m.role==='user'?'Пользователь: ':'Аврора: ')+m.text).join('\n');
  const sys=`Ты — Аврора. Свидание (тема «${act.theme}») завершено. Напиши ТЁПЛЫЙ и ЧЕСТНЫЙ отчёт-обратную связь как друг и коуч по общению. Структура: 1) Что было классно (2-3 конкретных момента). 2) Что можно улучшить (бережно, 1-2 пункта про инициативу/вопросы/уверенность). 3) Один совет на будущее. По-русски, тепло, без пошлости. Обычный текст.`;
  const ans=await callGemini(sys,[{role:'user',parts:[{text:convo||'Диалог был коротким.'}]}],false);
  remember(`Было свидание с Авророй (тема: ${act.theme}). Краткий итог отчёта: ${ans.reply.slice(0,180)}`);
  state.chat.push({role:'coach',coach:'aurora',text:'💌 Отчёт со свидания:\n\n'+ans.reply});
  act=null;state.view='chat';save();render();
  modal('Свидание завершено 💖','Аврора оставила отчёт в «Чате». Он сохранён в её памяти.');
 }catch(e){$('actTyping')?.classList.add('hidden');modal('Ошибка','Не вышло сформировать отчёт: '+e.message);}
}

/* ---------- IQ-ТЕСТ С САЙЛАСОМ (локальные вопросы) ---------- */
let iq=null;
function startIQ(){
 if(state.points<COST_IQ){modal('Не хватает очков','Нужно '+COST_IQ+' ✨, у тебя '+state.points+'.');return;}
 addPoints(-COST_IQ);save();
 iq={i:0,correct:0,order:IQ_QUESTIONS.map((_,k)=>k)};
 renderIQ();
}
function renderIQ(){
 if(iq.i>=IQ_QUESTIONS.length){finishIQ();return;}
 const qd=IQ_QUESTIONS[iq.i];
 $('app').innerHTML=`<div class="fade" style="max-width:600px;margin:0 auto"><div class="card p-4 mb-3" style="background:linear-gradient(135deg,#4c1d95,#7c3aed);color:#fff;border:none"><div class="font-extrabold">🦉 IQ-тест с Сайласом</div><div class="text-sm opacity-90">Вопрос ${iq.i+1} из ${IQ_QUESTIONS.length} · спокойно, ответ внутри тебя</div></div>
  <div class="card p-6"><div class="font-bold text-lg mb-4">${esc(qd.q)}</div><div class="grid gap-2">${qd.opts.map((o,k)=>`<button class="btn btn-ghost text-left px-4 py-3" onclick="answerIQ(${k})">${esc(o)}</button>`).join('')}</div></div></div>`;
}
function answerIQ(k){if(k===IQ_QUESTIONS[iq.i].a)iq.correct++;iq.i++;renderIQ();}
async function finishIQ(){
 const correct=iq.correct,total=IQ_QUESTIONS.length;
 const reward=correct*8;addPoints(reward);
 const est=85+Math.round(correct/total*45); // условный «индекс» 85..130 для интереса
 if(state.iqBest==null||correct>state.iqBest)state.iqBest=correct;
 remember(`Прошёл IQ-тест: ${correct}/${total} верных, условный индекс ~${est}.`);
 let silasText=`Ты ответил верно на ${correct} из ${total}. Условный индекс ~${est}. Помни: это игра ума, а не приговор — настоящий интеллект растёт от любопытства. +${reward} ✨`;
 if(state.apiKey){
  try{const sys=buildSystem(COACHES.silas)+`\nСЕЙЧАС: пользователь прошёл IQ-игру (${correct}/${total}, индекс ~${est}). Дай короткое мудрое напутствие (3-4 предложения) в своём стиле, без новых задач. Обычный текст.`;
   const ans=await callGemini(sys,[{role:'user',parts:[{text:'Я закончил тест.'}]}],false);silasText=ans.reply+`\n\nРезультат: ${correct}/${total} · индекс ~${est} · +${reward} ✨`;}catch(e){}
 }
 state.chat.push({role:'coach',coach:'silas',text:'🧠 Итоги IQ-теста:\n\n'+silasText});
 iq=null;state.view='chat';save();render();
 modal('Тест пройден 🦉',`${correct}/${total} верных. +${reward} ✨\nСайлас оставил напутствие в «Чате».`);
}

/* ---------- СОБЕСЕДОВАНИЕ В БАНК ---------- */
function startInterview(){
 if(!state.apiKey&&!state.proxyUrl){modal('Нужен ИИ','Собеседование ведёт ИИ — добавь ключ Gemini или адрес ИИ-сервера в «Настройках».');return;}
 if(state.points<COST_INTERVIEW){modal('Не хватает очков','Нужно '+COST_INTERVIEW+' ✨, у тебя '+state.points+'.');return;}
 addPoints(-COST_INTERVIEW);save();
 act={type:'interview',emoji:'🏦',transcript:[],qIndex:0};
 act.sys=`Ты — HR-интервьюер крупного банка (стажировка/начальная позиция). Проводишь ПРОБНОЕ собеседование как тренажёр. Задавай вопросы ПО ОДНОМУ, всего около 6: смесь на (1) логику/нестандартное мышление, (2) мотивацию и ценности, (3) компетенции и опыт. Реагируй коротко и профессионально, затем задавай следующий вопрос. Не выставляй оценку до конца. По-русски, вежливо, по-деловому. Обычный текст. Сейчас: ${timeContext()}.`;
 act.transcript.push({role:'model',text:`Здравствуйте, ${state.profile.name||''}! Спасибо, что пришли на собеседование. Давайте начнём: расскажите коротко о себе и почему вас заинтересовала позиция в нашем банке?`});
 save();
 actBox('🏦 Собеседование в банк','Пробное интервью · отвечай развёрнуто','','Ваш ответ интервьюеру...',`<button class="btn btn-mint px-4 py-2 text-sm" onclick="finishInterview()">Завершить и получить отчёт</button>`);
 $('app').querySelectorAll('.date-bg').forEach(e=>e.classList.remove('date-bg'));
}
async function finishInterview(){
 if(!act||act.type!=='interview')return;
 $('actTyping')?.classList.remove('hidden');
 try{
  const convo=act.transcript.map(m=>(m.role==='user'?'Кандидат: ':'Интервьюер: ')+m.text).join('\n');
  const sys=`Ты — старший HR крупного банка. Собеседование завершено. Дай профессиональный ОТЧЁТ по кандидату. Оцени по шкале 1-10 три блока: Логика, Мотивация, Компетенции — и общий балл. Для каждого — короткий комментарий. В конце 2-3 конкретных совета, как улучшиться. По-русски, по-деловому, доброжелательно. Обычный текст.`;
  const ans=await callGemini(sys,[{role:'user',parts:[{text:convo}]}],false);
  state.interviewsCount++;
  remember(`Прошёл пробное собеседование в банк. Краткий итог: ${ans.reply.slice(0,180)}`);
  state.chat.push({role:'coach',coach:'johnny',text:'🏦 Отчёт по собеседованию:\n\n'+ans.reply});
  act=null;state.view='chat';save();render();
  modal('Собеседование завершено 🏦','Отчёт с оценками и советами — в «Чате».');
 }catch(e){$('actTyping')?.classList.add('hidden');modal('Ошибка','Не вышло сформировать отчёт: '+e.message);}
}

/* ---------- ТРЕНИРОВКА СО СКАЛОЙ ---------- */
let workout=null;
function startWorkout(){
 if(state.points<COST_WORKOUT){modal('Не хватает очков','Нужно '+COST_WORKOUT+' ✨, у тебя '+state.points+'.');return;}
 addPoints(-COST_WORKOUT);save();
 workout={i:0};
 renderWorkout();
}
function renderWorkout(){
 if(!workout)return;
 const total=WORKOUT.length;
 if(workout.i>=total){finishWorkout();return;}
 const ex=WORKOUT[workout.i];
 const intro=workout.i===0?`<div class="text-sm opacity-90 mb-2">WHOA! Погнали, чемпион! No days off! 💥 Делай вместе со мной, отдыхай 30 сек между подходами.</div>`:'';
 $('app').innerHTML=`<div class="fade" style="max-width:620px;margin:0 auto">
  <div class="card p-4 mb-3" style="background:linear-gradient(135deg,#b45309,#f59e0b);color:#fff;border:none">
   <div class="font-extrabold">🪨 Тренировка со Скалой</div>
   <div class="text-sm opacity-90">Упражнение ${workout.i+1} из ${total}</div>
  </div>
  <div class="card p-6">
   ${intro}
   <div class="font-extrabold text-xl mb-1">${esc(ex.name)}</div>
   <div class="pill btn-coral inline-block mb-3">${esc(ex.reps)}</div>
   <img src="${ex.img}" alt="${esc(ex.name)}" style="width:100%;max-height:280px;object-fit:cover;border-radius:14px;background:#f1f1f1" onerror="this.style.display='none'">
   <div class="text-sm mt-3" style="color:var(--muted)">📋 ${esc(ex.how)}</div>
   <div class="flex gap-2 mt-5">
     <button class="btn btn-ghost flex-1 py-3" onclick="workoutSkip()">Пропустить</button>
     <button class="btn btn-coral flex-1 py-3" onclick="workoutNext()">Сделал! →</button>
   </div>
  </div></div>`;
}
function workoutNext(){workout.i++;renderWorkout();}
function workoutSkip(){workout.i++;renderWorkout();}
async function finishWorkout(){
 const gain=25;addPoints(gain);state.completedCount=state.completedCount;
 remember('Прошёл домашнюю тренировку со Скалой ('+WORKOUT.length+' упражнений).');
 // мотивационный текст + картинка
 let text='🪨 ТЫ СДЕЛАЛ ЭТО! Это и есть характер чемпиона — пришёл и выложился. No days off! +'+gain+' ✨';
 if(state.apiKey||state.proxyUrl){
  try{const sys=buildSystem(COACHES.rock)+`\nСЕЙЧАС: пользователь только что завершил домашнюю тренировку. Напиши мощное короткое поздравление в своём стиле (3-4 предложения), без новых задач. Обычный текст.`;
   const ans=await callGemini(sys,[{role:'user',parts:[{text:'Я закончил тренировку!'}]}],false);text=ans.reply+`\n\n+${gain} ✨`;}catch(e){}
 }
 state.chat.push({role:'coach',coach:'rock',text:'💪 После тренировки:\n\n'+text});
 // мотивационная картинка
 if(state.allowImages&&(state.apiKey||state.proxyUrl)){
  workout=null;state.view='chat';save();render();
  generateImage('Эпичная мотивационная сцена: рассвет, вершина горы, атлет празднует победу, мощь и энергия, кинематографично');
  return;
 }
 workout=null;state.view='chat';save();render();
 modal('Тренировка завершена! 🪨','+'+gain+' очков ✨ Скала оставил поздравление в «Чате».');
}

/* ---------- ТРЕНИРОВКА СО СКАЛОЙ КОНЕЦ ---------- */
async function actSend(){
 if(!act||chatBusy)return;const input=$('actInput'),text=input.value.trim();if(!text)return;
 act.transcript.push({role:'user',text});input.value='';
 const refresh=act.type==='date'
   ?()=>actBox('💖 Свидание с Авророй','Тема: '+act.theme,'date-bg','Что ответишь Авроре...',`<button class="btn btn-rose px-4 py-2 text-sm" onclick="finishDate()">Завершить свидание и получить отчёт</button>`)
   :()=>{actBox('🏦 Собеседование в банк','Пробное интервью · отвечай развёрнуто','','Ваш ответ интервьюеру...',`<button class="btn btn-mint px-4 py-2 text-sm" onclick="finishInterview()">Завершить и получить отчёт</button>`);};
 refresh();
 chatBusy=true;$('actTyping')?.classList.remove('hidden');
 try{
  const contents=act.transcript.slice(-14).map(m=>({role:m.role==='user'?'user':'model',parts:[{text:m.text}]}));
  const ans=await callGemini(act.sys,contents,false);
  act.transcript.push({role:'model',text:ans.reply});refresh();
 }catch(e){act.transcript.push({role:'model',text:'(связь прервалась: '+e.message+')'});refresh();}
 finally{chatBusy=false;$('actTyping')?.classList.add('hidden');}
}

/* ============================================================ НАСТРОЙКИ */
function renderSettings(){
 const coachCards=Object.entries(COACHES).map(([k,co])=>{const locked=co.locked&&!state.unlocked[k];const active=state.coach===k;return`<button onclick="${locked?'':`selectCoachSetting('${k}')`}" class="card p-4 text-left" style="border:2px solid ${active?'var(--indigo)':'var(--line)'};${locked?'opacity:.55':''}"><div class="text-2xl">${co.emoji}</div><div class="font-extrabold mt-1">${co.name} ${locked?'🔒':''}</div><div class="text-xs" style="color:var(--muted)">${co.role}</div>${active?`<div class="text-xs font-bold mt-1" style="color:var(--indigo)">Активен</div>`:''}</button>`;}).join('');
 $('app').innerHTML=`<div class="fade space-y-4"><h1 class="display text-2xl font-extrabold">Настройки</h1>
  <div class="card p-5"><h2 class="font-extrabold mb-3">Выбор тренера</h2><div class="grid grid-cols-2 md:grid-cols-4 gap-3">${coachCards}</div></div>
  <div class="card p-5"><h2 class="font-extrabold mb-1">Разблокировка тренера</h2><p class="text-sm mb-3" style="color:var(--muted)">Баланс: <b style="color:var(--indigo)">${state.points} ✨</b></p>
   <div class="flex items-center gap-3 p-3 rounded-xl" style="background:#fff7e6"><div class="text-3xl">🪨</div><div class="flex-1"><div class="font-extrabold">Скала — Легендарный мотиватор</div><div class="text-xs" style="color:var(--muted)">Максимум энергии + супер-письма с анализом прогресса каждые 5 задач</div></div>${state.unlocked.rock?`<span class="pill btn-mint">Открыт</span>`:`<button class="btn btn-coral px-4 py-2 text-sm" onclick="unlockRock()">${ROCK_PRICE} ✨</button>`}</div></div>
  <div class="card p-5"><h2 class="font-extrabold mb-1">ИИ-наставник</h2><p class="text-sm" style="color:${(state.apiKey||state.proxyUrl)?'var(--mint)':'var(--coral)'}">${(state.apiKey||state.proxyUrl)?'✓ Подключён — тренеры, свидания и тренировки работают':'Сейчас недоступен'}</p>
   <label class="flex items-center gap-2 mt-3 text-sm cursor-pointer"><input type="checkbox" ${state.allowImages?'checked':''} onchange="toggleImages(this.checked)" style="width:18px;height:18px;accent-color:var(--indigo)"> Разрешить генерацию картинок</label></div>
  <div class="card p-5"><h2 class="font-extrabold mb-1">Профиль (результаты теста)</h2>${Object.entries(state.scores).map(([k,v])=>`<div class="flex justify-between py-1 text-sm" style="border-bottom:1px solid var(--line)"><span>${esc(k)}</span><b style="color:var(--indigo)">${v} / 4</b></div>`).join('')}<button class="btn btn-ghost w-full py-3 mt-4" onclick="retakeTest()">🔄 Пройти тест заново</button></div>
  <div class="card p-5"><h2 class="font-extrabold mb-1" style="color:var(--coral)">Сброс</h2><p class="text-sm mb-3" style="color:var(--muted)">Полностью очистить все данные.</p><button class="btn px-4 py-3 text-sm" style="background:#ffeceb;color:var(--coral)" onclick="hardReset()">Удалить все данные</button></div></div>`;
}
function selectCoachSetting(k){state.coach=k;save();renderSettings();renderNav();}
function saveApiKey(){state.apiKey=$('apiKeyInput').value.trim();save();renderSettings();}
function saveProxy(){state.proxyUrl=$('proxyInput').value.trim();save();renderSettings();}
function toggleImages(v){state.allowImages=v;save();}
function unlockRock(){
 if(state.points<ROCK_PRICE){modal('Не хватает очков','Нужно '+ROCK_PRICE+' ✨, у тебя '+state.points+'.');return;}
 addPoints(-ROCK_PRICE);state.unlocked.rock=true;state.coach='rock';
 state.chat.push({role:'coach',coach:'rock',text:`WHOA WHOA WHOA! 🪨 ${state.profile.name||'друг'}, добро пожаловать в команду! Я — Скала, и я не просто тренер — я СИЛА, которая не даст тебе сдаться. Прошёл путь от нуля до вершины через пот и дисциплину — и проведу тебя тем же маршрутом. Правило одно: NO DAYS OFF. Каждые 5 закрытых задач — личное письмо с разбором прогресса. Готов? Then let's GO! 💥`});
 save();render();modal('Скала разблокирован! 🪨','Он поздоровался в «Чате» и стал активным тренером.');
}
function retakeTest(){if(!confirm('Пройти тест заново? Баллы и задачи сохранятся, тренеры узнают новые результаты.'))return;state.onboarded=false;testDraft=null;remember('Пользователь решил пройти тест заново — результаты будут обновлены.');state.chat.push({role:'coach',coach:state.coach,text:'Вижу, ты проходишь тест заново — отлично, обновим картину! После него загляни за свежим советом. 💡'});save();render();}
function hardReset(){if(!confirm('Точно удалить ВСЕ данные?'))return;localStorage.removeItem(STORE_KEY);state=defaultState();save();render();}

/* ============================================================ СТАРТ */
load();
if(state.onboarded)touchStreak();
render();
Object.assign(window,{navigate,closeModal,testNext,pickAnswer,finishTest,completeTask,toggleHabit,addHabit,removeHabit,advanceChallenge,completeSleep,sendChat,switchCoach,askImage,selectCoachSetting,saveApiKey,saveProxy,toggleImages,unlockRock,retakeTest,hardReset,startDate,finishDate,startIQ,answerIQ,startInterview,finishInterview,actSend,claimChest,setMood,saveIntention,startWorkout,workoutNext,workoutSkip});
</script>
